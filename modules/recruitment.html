/* ── Utility functions ── */
function esc(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, function(m) {
    return {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[m];
  });
}

function g(id) { var e = document.getElementById(id); return e ? e.value.trim() : ''; }

function formatTime(time) {
  if (!time) return 'No time';
  var [hours, minutes] = time.split(':');
  var hour = parseInt(hours);
  var ampm = hour >= 12 ? 'PM' : 'AM';
  hour = hour % 12;
  hour = hour === 0 ? 12 : hour;
  return hour + ':' + minutes + ' ' + ampm;
}

// Standalone redirect detection
(function() {
  'use strict';
  
  function isInIframe() {
    try {
      return window.self !== window.top;
    } catch (e) {
      return true;
    }
  }
  
  function getModuleName() {
    var path = window.location.pathname;
    var filename = path.split('/').pop();
    return filename.replace('.html', '');
  }
  
  function redirectToDashboard(moduleName) {
    var dashboardUrl = window.location.pathname.replace(/\/[^\/]*$/, '/dashboard.html');
    var separator = dashboardUrl.includes('?') ? '&' : '?';
    var targetUrl = dashboardUrl + separator + 'module=' + encodeURIComponent(moduleName);
    window.location.replace(targetUrl);
  }
  
  if (!isInIframe()) {
    var moduleName = getModuleName();
    console.log('Module loaded standalone, redirecting to dashboard with module:', moduleName);
    
    document.body.innerHTML = `
      <div style="
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f8f9fa;
        color: #2ca078;
        font-size: 18px;
        font-weight: 600;
      ">
        <div style="text-align: center;">
          <div style="
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #2ca078;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
          "></div>
          Loading HR Dashboard...
        </div>
      </div>
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    `;
    
    setTimeout(function() {
      redirectToDashboard(moduleName);
    }, 500);
    return;
  } else {
    console.log('Module loaded in dashboard context');
  }
})();

/* ── Load from localStorage on init ── */
async function r_loadFromStorage() {
  console.log('Loading jobs from API...');
  try {
    const response = await fetch('../api/simple-api-new.php?action=get_job_postings');
    const data = await response.json();
    console.log('Jobs API Response:', data);
    
    if (data.error) {
      console.error('Error loading jobs:', data.error);
      JOBS = [];
    } else {
      // Check if we need to migrate from localStorage
      var localJobs = [];
      try {
        var j = localStorage.getItem(KEY_JOBS);
        localJobs = j ? JSON.parse(j) : [];
        console.log('Found localStorage jobs:', localJobs.length);
        if (localJobs.length > 0) {
          console.log('Sample localStorage job:', localJobs[0]);
        }
      } catch(e) {
        console.log('No localStorage jobs found:', e);
      }
      
      // If database is empty but localStorage has jobs, migrate them
      if (data.length === 0 && localJobs.length > 0) {
        console.log('Database is empty, localStorage has jobs. Starting migration...');
        await r_migrateJobsToDatabase(localJobs);
        
        // Reload from database after migration
        console.log('Reloading from database after migration...');
        const migrationResponse = await fetch('../api/simple-api-new.php?action=get_job_postings');
        const migrationData = await migrationResponse.json();
        console.log('Migration reload response:', migrationData);
        if (!migrationData.error) {
          data = migrationData;
        }
      }
      
      JOBS = data.map(function(job) {
        return {
          id: job.id,
          title: job.title,
          dept: job.department,
          location: job.location,
          emptype: job.employment_type,
          desc: job.description,
          requirements: job.requirements,
          benefits: job.benefits,
          salary: job.salary_range,
          status: job.status,
          posted: job.posted_date,
          apps: job.applicants_count || 0,
          interviews: 0, // TODO: Calculate from interviews table
          applicants: job.applicants || []
        };
      });
      console.log('Processed JOBS:', JOBS);
    }
  } catch(e) { 
    console.error('Error loading jobs:', e);
    JOBS = []; 
  }
}

async function r_migrateJobsToDatabase(localJobs) {
  console.log('Starting migration of', localJobs.length, 'jobs...');
  
  for (var i = 0; i < localJobs.length; i++) {
    var job = localJobs[i];
    try {
      const response = await fetch('../api/simple-api-new.php?action=save_job_posting', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({
          title: job.title,
          department: job.dept,
          location: job.location,
          employment_type: job.emptype,
          description: job.desc,
          salary_range: job.salary || '',
          status: job.status || 'Active'
        })
      });
      
      const data = await response.json();
      if (data.success) {
        console.log('Migrated job:', job.title);
      } else {
        console.error('Failed to migrate job:', job.title, data.error);
      }
    } catch(e) {
      console.error('Error migrating job:', job.title, e);
    }
  }
  
  console.log('Migration completed. Clearing localStorage...');
  localStorage.removeItem(KEY_JOBS);
}

function r_saveJobs() {
  try { 
    console.log('Saving jobs:', JOBS);
    localStorage.setItem(KEY_JOBS, JSON.stringify(JOBS));
    console.log('Jobs saved successfully');
  } catch(e) { 
    console.error('Error saving jobs:', e);
  }
}

// Manual migration function
async function r_manualMigrate() {
  console.log('Manual migration triggered...');
  
  // Check localStorage first
  var localJobs = [];
  try {
    var j = localStorage.getItem(KEY_JOBS);
    localJobs = j ? JSON.parse(j) : [];
    console.log('Found localStorage jobs:', localJobs.length);
  } catch(e) {
    console.log('No localStorage jobs found:', e);
  }
  
  if (localJobs.length > 0) {
    console.log('Migrating localStorage jobs...');
    await r_migrateJobsToDatabase(localJobs);
    await r_loadFromStorage();
    r_render();
    r_updateStats();
    r_toast('Jobs migrated successfully!');
  } else {
    console.log('No localStorage jobs found, creating sample jobs...');
    await r_createSampleJobs();
    await r_loadFromStorage();
    r_render();
    r_updateStats();
    r_toast('Sample jobs created!');
  }
}

/* ── Init ── */
(function init() {
  try {
    if (window.parent !== window)
      document.body.classList.toggle('dark-mode', window.parent.document.body.classList.contains('dark-mode'));
  } catch(e) {}
  
  // Ensure DOM is ready before loading
  function delayedInit() {
    r_loadFromStorage();
    r_loadInterviews().then(() => {
      console.log(' Interviews loaded, now rendering...');
      r_render();
      console.log(' About to call r_renderInterviews()...');
      console.log(' r_renderInterviews function exists:', typeof r_renderInterviews);
      console.log(' Calling r_renderInterviews() directly...');
      setTimeout(() => {
        console.log(' Timeout: Calling r_renderInterviews() after delay...');
        try {
          r_renderInterviews();
          console.log(' r_renderInterviews() executed successfully');
        } catch(e) {
          console.error(' r_renderInterviews() failed:', e);
        }
      }, 100);
      r_updateStats();
    });
  }
  
  // Try immediate init first
  delayedInit();
  
  // If that fails, try again after DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', delayedInit);
  }
  
  // Also try after a short delay to handle iframe loading issues
  setTimeout(delayedInit, 100);
  
  // Poll every 5 seconds to pick up new applications from careers site
  setInterval(function() {
    r_loadFromStorage();
    r_render();
    r_updateStats();
  }, 5000);
})();

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'THEME') document.body.classList.toggle('dark-mode', e.data.dark);
  if (e.data && e.data.type === 'NEW_APPLICATION') { r_loadFromStorage(); r_render(); r_updateStats(); }
});

/* ── Tabs ── */
function r_tab(t, btn) {
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var p = document.getElementById('r_tab_' + t);
  if (p) p.classList.add('active');
  if (btn) btn.classList.add('active');
  if (t === 'jobs')           r_render();
  if (t === 'offers')         r_renderOffers();
  if (t === 'communications') r_renderComms();
  if (t === 'interviews')     r_renderInterviews();
  if (t === 'talent')         r_renderTalent();
}

/* ── Modal helpers ── */
function r_open(id) {
  try { if (window.parent !== window) { window.parent.postMessage({type:'HR1_OPEN_MODAL',modalId:id},'*'); return; } } catch(e) {}
  var m = document.getElementById(id); if (m) m.classList.add('active');
}
function r_close(id) {
  try { if (window.parent !== window) { window.parent.postMessage({type:'HR1_CLOSE_MODAL'},'*'); return; } } catch(e) {}
  var m = document.getElementById(id); if (m) m.classList.remove('active');
}

function r_toast(msg, type) {
  try { if (window.parent !== window) { window.parent.postMessage({type:'HR1_TOAST',msg:msg,style:type||'success'},'*'); return; } } catch(e) {}
}

async function r_saveInterview() {
  var applicantId = document.getElementById('r_interview_applicant').value;
  var date = document.getElementById('r_interview_date').value;
  var time = document.getElementById('r_interview_time').value;
  var type = document.getElementById('r_interview_type').value;
  var notes = document.getElementById('r_interview_notes').value;
  
  if (!applicantId || !date || !time || !type) {
    r_toast('Please fill all required fields', 'error');
    return;
  }
  
  try {
    const response = await fetch('../api/simple-api-new.php?action=save_interview', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({
        id: document.getElementById('r_interview_id')?.value || null,
        applicant_id: applicantId,
        interview_date: date,
        interview_time: time,
        interview_type: type,
        notes: notes
      })
    });
    
    const data = await response.json();
    if (data.success) {
      r_close('r_modal_interview');
      // Clear form
      document.getElementById('r_interview_applicant').value = '';
      document.getElementById('r_interview_date').value = '';
      document.getElementById('r_interview_time').value = '';
      document.getElementById('r_interview_type').value = 'Phone Screen';
      document.getElementById('r_interview_notes').value = '';
      document.getElementById('r_interview_id').value = '';
      
      var message = document.getElementById('r_interview_id')?.value ? 'Interview updated successfully!' : 'Interview scheduled successfully!';
      r_toast(message);
      // Add small delay to ensure database update completes
      setTimeout(async () => {
        await r_loadInterviews();
        r_renderInterviews();
        r_updateStats();
      }, 200);
    } else {
      r_toast('Error scheduling interview: ' + (data.error || 'Unknown error'), 'error');
    }
  } catch(e) {
    console.error('Error saving interview:', e);
    r_toast('Error scheduling interview', 'error');
  }
}

async function r_loadInterviews() {
  console.log('Loading interviews from database...');
  try {
    const response = await fetch('../api/simple-api-new.php?action=get_interviews');
    const data = await response.json();
    console.log('Interviews API Response:', data);
    
    if (data.error) {
      console.error('Error loading interviews:', data.error);
      INTERVIEWS = [];
    } else {
      INTERVIEWS = data;
      console.log('Processed INTERVIEWS:', INTERVIEWS);
    }
  } catch(e) { 
    console.error('Error loading interviews:', e);
    INTERVIEWS = []; 
  }
}

window.r_renderInterviews = function() {
  try {
    console.log('Rendering interviews:', INTERVIEWS.length);
        
    var el = document.getElementById('r_interviews'); 
    console.log('  - Element found:', !!el);
    
    if (!el) {
      console.error(' r_interviews element not found!');
      return;
    }
    
    if (!INTERVIEWS.length) {
      console.log(' No interviews to display, showing empty state');
      el.innerHTML = '<div class="empty-state">No interviews scheduled yet. Click <strong>+ Schedule Interview</strong> to get started.</div>';
      return;
    }
    
    console.log(' Rendering', INTERVIEWS.length, 'interviews');
    
    el.innerHTML = INTERVIEWS.map(function(interview) {
      console.log('  Rendering interview:', interview.applicant_name);
      var interviewDate = interview.interview_date ? interview.interview_date.split('-').reverse().join('/') : 'No date';
      var interviewTime = interview.interview_time ? formatTime(interview.interview_time) : 'No time';
      var applicantName = interview.applicant_name || 'Unknown Applicant';
      var interviewType = interview.interview_type || 'Unknown Type';
      var interviewNotes = interview.notes || '';
      
      return '<div class="interview-card">' +
        '<div class="interview-header">' +
          '<div class="interview-info">' +
            '<h3>' + applicantName + '</h3>' +
            '<p>' + interviewType + '</p>' +
          '</div>' +
          '<span class="badge bd-scheduled">Scheduled</span>' +
        '</div>' +
        '<div class="interview-details">' +
          '<p><strong>Date:</strong> ' + interviewDate + '<br><strong>Time:</strong> ' + interviewTime + 
          (interviewNotes ? '<br><strong>Notes:</strong> ' + interviewNotes : '') +
          '</p>' +
        '</div>' +
        '<div class="interview-actions">' +
          '<button class="btn-sm bsm-blue" onclick="r_editInterview(\'' + interview.id + '\')">Edit</button>' +
          '<button class="btn-sm bsm-red" onclick="r_deleteInterview(\'' + interview.id + '\')">Delete</button>' +
        '</div>' +
      '</div>';
    }).join('');
    
    console.log(' r_renderInterviews() completed');
  } catch(e) {
    console.error(' Error in r_renderInterviews():', e);
    console.error('❌ Error in r_renderInterviews():', e);
    console.error('Error stack:', e.stack);
  }
}

async function r_editInterview(id) {
  // Find the interview to edit
  var interview = INTERVIEWS.find(function(i) { return String(i.id) === String(id); });
  if (!interview) {
    r_toast('Interview not found', 'error');
    return;
  }
  
  // Populate the modal with existing data
  document.getElementById('r_interview_applicant').value = interview.applicant_name || '';
  document.getElementById('r_interview_date').value = interview.interview_date || '';
  document.getElementById('r_interview_time').value = interview.interview_time || '';
  document.getElementById('r_interview_type').value = interview.interview_type || 'Phone Screen';
  document.getElementById('r_interview_notes').value = interview.notes || '';
  document.getElementById('r_interview_id').value = interview.id || '';
  
  // Change modal title for editing
  document.getElementById('r_interview_modal_title').textContent = 'Edit Interview';
  
  // Open the modal for editing
  r_open('r_modal_interview');
}

async function r_deleteInterview(id) {
  try {
    // Direct deletion without confirmation
    
    const response = await fetch(`../api/simple-api-new.php?action=delete_interview&id=${id}`, {
      method: 'DELETE'
    });
    
    const data = await response.json();
    if (data.success) {
      await r_loadInterviews();
      r_renderInterviews(); 
      r_updateStats();
      r_toast('Interview deleted successfully!');
    } else {
      r_toast('Error deleting interview: ' + (data.error || 'Unknown error'), 'error');
    }
  } catch(e) {
    console.error('Error deleting interview:', e);
    r_toast('Error deleting interview', 'error');
  }
}

async function r_save() {
  var title = g('r_title'), desc = g('r_desc');
  if (!title || !desc) { r_toast('Fill required fields', 'error'); return; }
  
  try {
    const response = await fetch('../api/simple-api-new.php?action=save_job_posting', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({
        title: title,
        department: g('r_dept'),
        location: g('r_location'),
        employment_type: g('r_emptype'),
        description: desc,
        salary_range: g('r_salary'),
        status: 'Active'
      })
    });
    
    const data = await response.json();
    if (data.success) {
      r_close('r_modal_add');
      ['r_title','r_dept','r_location','r_emptype','r_salary','r_desc'].forEach(function(id) { 
        var e = document.getElementById(id); 
        if (e) e.value = ''; 
      });
      await r_loadFromStorage();
      r_render(); 
      r_updateStats();
      r_toast('Job posted successfully!');
    } else {
      r_toast('Error posting job: ' + (data.error || 'Unknown error'), 'error');
    }
  } catch(e) {
    console.error('Error saving job:', e);
    r_toast('Error posting job', 'error');
  }
}

/* ── Render job cards ── */
function r_render() {
  var el = document.getElementById('r_jobs'); if (!el) return;
  if (!JOBS.length) {
    el.className = '';
    el.innerHTML = '<div class="empty-state">No job postings yet. Click <strong>+ Create Job Post</strong> to get started.</div>';
    return;
  }
  el.className = 'job-grid';
  el.innerHTML = JOBS.map(function(j) {
    var desc = (j.desc || '').length > 100 ? j.desc.substring(0,100) + '...' : j.desc;
    return '<div class="job-card">' +
      '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px;">' +
        '<div><h3 style="font-size:17px;margin-bottom:3px;">' + esc(j.title) + '</h3>' +
        '<p style="font-size:13px;color:var(--text-secondary);">' + esc(j.dept) + ' &bull; ' + esc(j.location) + '</p></div>' +
        '<span class="badge ' + (j.status === 'Active' ? 'bd-active' : 'bd-draft') + '">' + j.status + '</span>' +
      '</div>' +
      '<p style="font-size:13px;color:var(--text-secondary);line-height:1.7;margin-bottom:10px;">' + esc(desc) + '</p>' +
      '<div class="meta-row">' +
        '<span>' + ICO.cal + esc(j.posted) + '</span>' +
        '<span>' + ICO.usr + j.apps + ' applicant' + (j.apps !== 1 ? 's' : '') + '</span>' +
        '<span>' + ICO.mic + j.interviews + ' interview' + (j.interviews !== 1 ? 's' : '') + '</span>' +
      '</div>' +
      '<div style="display:flex;gap:8px;">' +
        '<button class="btn-sm bsm-blue" onclick="r_viewDetails(\'' + j.id + '\')">View Details</button>' +
        '<button class="btn-sm bsm-red" data-jid="' + j.id + '" onclick="r_deleteJob(this.dataset.jid)">Delete</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function r_deleteJob(id) {
  if (!confirm('Are you sure you want to delete this job posting?')) return;
  
  try {
    const response = await fetch(`../api/simple-api-new.php?action=delete_job_posting&id=${id}`, {
      method: 'DELETE'
    });
    
    const data = await response.json();
    if (data.success) {
      await r_loadFromStorage();
      r_render(); 
      r_updateStats();
      r_toast('Job posting removed successfully!');
    } else {
      r_toast('Error deleting job: ' + (data.error || 'Unknown error'), 'error');
    }
  } catch(e) {
    console.error('Error deleting job:', e);
    r_toast('Error deleting job', 'error');
  }
}

function r_viewDetails(jobId) {
  console.log('r_viewDetails called with jobId:', jobId, 'type:', typeof jobId);
  
  // Find the job - convert both to string for comparison
  var job = JOBS.find(function(j) { 
    console.log('Comparing j.id:', j.id, 'type:', typeof j.id, 'with jobId:', jobId);
    return String(j.id) === String(jobId); 
  });
  if (!job) {
    console.log('Job not found with ID:', jobId);
    console.log('Available jobs:', JOBS);
    return;
  }
  
  console.log('Found job:', job);
  
  // Use the applicants data already loaded from API
  var jobApplications = job.applicants || [];
  console.log('Applications for this job:', jobApplications.length);
  
  // Create modal HTML
  var modalHtml = `
    <div id="jobDetailsModal" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;

      z-index: 10000;
    ">
      <div style="
        background: var(--surface);
        color: var(--text-primary);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        max-width: 700px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        position: relative;
        border: 1px solid var(--border-color);
      ">
        <button onclick="this.closest('#jobDetailsModal').remove()" style="
          position: absolute;
          top: 15px;
          right: 15px;
          background: transparent;
          border: none;
          font-size: 24px;
          cursor: pointer;
          color: var(--text-secondary);
          padding: 5px;
          line-height: 1;
        ">&times;</button>
        
        <h2 style="margin: 0 0 20px 0; color: var(--text-primary);">${job.title}</h2>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px;">
          <div>
            <strong style="color: var(--text-secondary);">Department:</strong><br>
            <span style="color: var(--text-primary);">${job.dept}</span>
          </div>
          <div>
            <strong style="color: var(--text-secondary);">Location:</strong><br>
            <span style="color: var(--text-primary);">${job.location}</span>
          </div>
          <div>
            <strong style="color: var(--text-secondary);">Type:</strong><br>
            <span style="color: var(--text-primary);">${job.emptype}</span>
          </div>
          <div>
            <strong style="color: var(--text-secondary);">Status:</strong><br>
            <span class="badge ${job.status === 'Active' ? 'bd-active' : 'bd-draft'}">${job.status}</span>
          </div>
          <div>
            <strong style="color: var(--text-secondary);">Posted:</strong><br>
            <span style="color: var(--text-primary);">${job.posted}</span>
          </div>
          <div>
            <strong style="color: var(--text-secondary);">Salary:</strong><br>
            <span style="color: var(--text-primary);">${job.salary}</span>
          </div>
        </div>
        
        <div style="margin-bottom: 25px;">
          <h3 style="margin: 0 0 10px 0; color: var(--text-primary);">Job Description</h3>
          <p style="margin: 0; line-height: 1.6; color: var(--text-secondary);">${job.desc}</p>
        </div>
        
        <div style="margin-bottom: 25px;">
          <h3 style="margin: 0 0 10px 0; color: var(--text-primary);">Application Requirements</h3>
          <ul style="margin: 0; line-height: 1.6; color: var(--text-secondary); padding-left: 20px;">
            <li>Updated Resume/CV</li>
            <li>Birth Certificate</li>
            <li>Diploma/TOR</li>
            <li>Cover Letter (optional)</li>

              jobApplications.map(function(app, index) {
                return `
                  <div style="
                    padding: 12px;
                    margin-bottom: 10px;
                    background: var(--background);
                    border: 1px solid var(--border-color);
                    border-radius: 6px;

                  ">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                      <div>
                        <strong style="color: var(--text-primary);">${(app.first_name || '') + ' ' + (app.last_name || '')}</strong><br>
                        <span style="color: var(--text-secondary); font-size: 13px;">${app.email}</span><br>
                        <span style="color: var(--text-secondary); font-size: 13px;">${app.phone}</span>
                      </div>

                    ${app.message ? '<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-color);"><em style="color: var(--text-secondary); font-size: 13px;">"' + app.message + '"</em></div>' : ''}

    }
  } catch(e) {
    console.log('Parent window not available, using fallback');

  // Fallback: Add modal to current document body
  document.body.insertAdjacentHTML('beforeend', modalHtml);

function r_renderOffers() {
  var el = document.getElementById('r_offers'); if (!el) return;
  el.innerHTML = '<div style="margin-bottom:16px;"><button class="btn-primary" onclick="r_openOffer()">+ Extend New Offer</button></div>' +
    (OFFERS.length ? OFFERS.map(function(o) {
      var sc = o.status === 'Accepted' ? 'bd-accepted' : o.status === 'Rejected' ? 'bd-rejected' : 'bd-pending';
      return '<div class="offer-card"><div class="offer-hdr"><div class="offer-name">' + esc(o.name) + '</div><span class="badge ' + sc + '">' + o.status + '</span></div>' +
        '<div class="offer-details"><strong>Position:</strong> ' + esc(o.position) + '<br><strong>Salary:</strong> ' + esc(o.salary) + '<br><strong>Start Date:</strong> ' + esc(o.startDate) + '<br><strong>Extended:</strong> ' + o.extendedAt + (o.details ? '<br><strong>Details:</strong> ' + esc(o.details) : '') + '</div></div>';
    }).join('') : '<p class="empty-state">No offers extended yet.</p>');
}

/* ── Communications ── */
function r_saveComm() {
  var to = g('r_comm_to'), subj = g('r_comm_subj'), msg = g('r_comm_msg');
  if (!to || !subj || !msg) { r_toast('Fill all fields', 'error'); return; }
  COMMS.unshift({id:Date.now(),to:to,subject:subj,message:msg,sentAt:new Date().toLocaleString()});
  r_close('r_modal_comm');
  ['r_comm_to','r_comm_subj','r_comm_msg'].forEach(function(id){ var e=document.getElementById(id); if(e) e.value=''; });
  r_renderComms(); r_toast('Message sent to ' + to);
}
function r_renderComms() {
  var el = document.getElementById('r_comms'); if (!el) return;
  el.innerHTML = '<div style="margin-bottom:16px;"><button class="btn-primary" onclick="r_openComm()">+ Send Communication</button></div>' +
    (COMMS.length ? '<div class="comm-log">' + COMMS.map(function(c) {
      return '<div class="comm-item"><div class="comm-meta"><span><strong>To:</strong> ' + esc(c.to) + '</span><span>' + c.sentAt + '</span></div>' +
        '<div style="font-weight:600;margin-bottom:4px;">' + esc(c.subject) + '</div><div style="color:var(--text-secondary);">' + esc(c.message) + '</div></div>';
    }).join('') + '</div>' : '<p class="empty-state">No communications sent yet.</p>');
}

/* ── Interviews / Talent (placeholders) ── */
function r_renderInterviews() {
  var el = document.getElementById('r_interviews'); if (!el) return;
  el.innerHTML = '<p class="empty-state">No interviews scheduled yet.</p>';
}
function r_renderTalent() {
  var el = document.getElementById('r_talent'); if (!el) return;
  // Pull unique applicants from localStorage
  try {
    var a = localStorage.getItem(KEY_APPS);
    var apps = a ? JSON.parse(a) : [];
    if (!apps.length) { el.innerHTML = '<p class="empty-state">Talent pool is empty. Applications from the Careers site will appear here.</p>'; return; }
    el.innerHTML = '<div class="job-grid">' + apps.map(function(ap) {
      return '<div class="job-card">' +
        '<div style="font-weight:700;font-size:15px;">' + esc((ap.fname||'') + ' ' + (ap.lname||'')) + '</div>' +
        '<div style="font-size:13px;color:var(--text-secondary);margin:4px 0;">' + esc(ap.email||'') + '</div>' +
        '<div style="font-size:12px;color:var(--text-secondary);">Applied for: <strong>' + esc(ap.position||'') + '</strong></div>' +
        '<div style="font-size:11px;color:var(--text-tertiary);margin-top:4px;">' + esc(ap.appliedAt||'') + '</div>' +
      '</div>';
    }).join('') + '</div>';
  } catch(e) { el.innerHTML = '<p class="empty-state">Unable to load talent pool.</p>'; }
}

/* ── Stats ── */
function r_updateStats() {
  function set(id, v) { 
    var e = document.getElementById(id); 
    if (e) {
      // Convert to number to remove any leading zeros
      var numValue = parseInt(v, 10) || 0;
      e.textContent = numValue;
    }
  }
  set('r_s_active',     JOBS.filter(function(j) { return j.status === 'Active'; }).length);
  set('r_s_apps',       JOBS.reduce(function(sum, j) { return sum + (j.apps||0); }, 0));
  set('r_s_interviews', INTERVIEWS.length);
  set('r_s_offers',     OFFERS.length);
  set('r_s_hired',      OFFERS.filter(function(o) { return o.status === 'Accepted'; }).length);
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Performance Evaluation</title>
<style>
:root{--brand-green:#2ca078;--button-hover:#4fb97a;--background:#f8f9fa;--surface:#ffffff;--surface-hover:#f5f5f5;--text-primary:#111827;--text-secondary:#6b7280;--text-tertiary:#9ca3af;--border-color:#e5e7eb;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);--shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);}
.dark-mode{--background:#0a0a0a;--surface:#1a1a1a;--surface-hover:#252525;--text-primary:#f9fafb;--text-secondary:#d1d5db;--text-tertiary:#9ca3af;--border-color:#2d2d2d;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--background);color:var(--text-primary);line-height:1.6;transition:background .3s,color .3s;}
input,select,textarea,button{font-family:inherit;}
.hr-content{padding:32px;}
.page-title{font-size:24px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:14px;color:var(--text-secondary);margin-bottom:24px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:8px;}
.btn-primary{padding:10px 20px;background:var(--brand-green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-primary:hover{background:var(--button-hover);transform:translateY(-1px);}
.btn-sm{padding:5px 12px;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.bsm-blue{background:rgba(59,130,246,.12);color:#3b82f6;}.bsm-blue:hover{background:#3b82f6;color:#fff;}
.bsm-green{background:rgba(44,160,120,.12);color:var(--brand-green);}.bsm-green:hover{background:var(--brand-green);color:#fff;}
.bsm-amber{background:rgba(245,158,11,.12);color:#d97706;}.bsm-amber:hover{background:#f59e0b;color:#fff;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border-color);border-radius:14px;padding:20px;text-align:center;box-shadow:var(--shadow);transition:all .2s;}
.stat-num{font-size:30px;font-weight:700;margin-bottom:4px;}
.c-green{color:var(--brand-green);}.c-blue{color:#3b82f6;}.c-amber{color:#f59e0b;}.c-red{color:#ef4444;}
.stat-label{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.tab-bar{display:flex;gap:4px;border-bottom:1px solid var(--border-color);margin-bottom:24px;flex-wrap:wrap;}
.tab-btn{padding:10px 18px;border:none;background:none;color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;border-radius:8px 8px 0 0;}
.tab-btn.active{color:var(--brand-green);border-bottom-color:var(--brand-green);}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.eval-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
.eval-card{background:var(--surface);border:1px solid var(--border-color);border-radius:14px;padding:20px;box-shadow:var(--shadow);transition:all .2s;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.bd-excellent{background:rgba(44,160,120,.15);color:var(--brand-green);}
.bd-good{background:rgba(59,130,246,.12);color:#3b82f6;}
.bd-satisfactory{background:rgba(245,158,11,.12);color:#f59e0b;}
.bd-needs-improvement{background:rgba(239,68,68,.12);color:#ef4444;}
.bd-pending{background:rgba(139,92,246,.12);color:#8b5cf6;}
.score-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px 0;}
.score-item{background:var(--background);border-radius:8px;padding:12px;text-align:center;}
.score-val{font-size:24px;font-weight:700;color:var(--brand-green);}
.score-lbl{font-size:11px;color:var(--text-secondary);margin-top:4px;}
.feedback-list{display:flex;flex-direction:column;gap:12px;}
.feedback-item{background:var(--background);border-left:3px solid var(--brand-green);border-radius:8px;padding:12px;}
.feedback-meta{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px;color:var(--text-tertiary);}
.pip-card{background:var(--surface);border:1px solid rgba(239,68,68,.3);border-radius:14px;padding:20px;margin-bottom:16px;}
.pip-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.pip-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.pip-active{background:rgba(245,158,11,.12);color:#f59e0b;}
.pip-completed{background:rgba(44,160,120,.12);color:var(--brand-green);}
.modal-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.active{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border-color);border-radius:16px;padding:28px;width:90%;max-width:680px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.2);}
.modal-box h2{font-size:20px;font-weight:700;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border-color);}
.modal-close{position:absolute;top:20px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-secondary);}
.form-group{margin-bottom:16px;}
.form-group label{display:block;margin-bottom:6px;font-size:13px;font-weight:600;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border-color);border-radius:10px;background:var(--background);color:var(--text-primary);font-size:14px;}
.form-group textarea{min-height:100px;resize:vertical;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.btn-submit{width:100%;padding:12px;background:var(--brand-green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
.dark-mode input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);}
.dark-mode input[type="date"]{color-scheme:dark;}
</style>
</head>
<body>
<div class="hr-content">
  <div class="page-header">
    <div><h1 class="page-title">Performance Evaluation</h1><p class="page-sub">Employee appraisals, feedback management, evaluation reports, and improvement plans</p></div>
    <button class="btn-primary" onclick="pe_openAdd()">+ New Evaluation</button>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num c-blue" id="pe_s_total">0</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num c-green" id="pe_s_excellent">0</div><div class="stat-label">Excellent</div></div>
    <div class="stat-card"><div class="stat-num c-amber" id="pe_s_needs">0</div><div class="stat-label">Needs Improvement</div></div>
    <div class="stat-card"><div class="stat-num c-red" id="pe_s_pip">0</div><div class="stat-label">Improvement Plans</div></div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="pe_tab('evaluations',this)">Appraisal Forms</button>
    <button class="tab-btn" onclick="pe_tab('records',this)">Performance Records</button>
    <button class="tab-btn" onclick="pe_tab('feedback',this)">Feedback Management</button>
    <button class="tab-btn" onclick="pe_tab('reports',this)">Evaluation Reports</button>
    <button class="tab-btn" onclick="pe_tab('pip',this)">Improvement Plans</button>
  </div>
  <div class="tab-panel active" id="pe_tab_evaluations"><div class="eval-grid" id="pe_list"></div></div>
  <div class="tab-panel" id="pe_tab_records"><div id="pe_records"></div></div>
  <div class="tab-panel" id="pe_tab_feedback"><div id="pe_feedback"></div></div>
  <div class="tab-panel" id="pe_tab_reports"><div id="pe_reports"></div></div>
  <div class="tab-panel" id="pe_tab_pip"><div id="pe_pip"></div></div>
</div>

<!-- Modal: New Evaluation -->
<div class="modal-overlay" id="pe_modal_add">
<div class="modal-box">
  <button class="modal-close" onclick="pe_close('pe_modal_add')">&times;</button>
  <h2>New Performance Evaluation</h2>
  <div class="form-group"><label>Employee Name</label><input type="text" id="pe_name"></div>
  <div class="form-row">
    <div class="form-group"><label>Position</label><input type="text" id="pe_position"></div>
    <div class="form-group"><label>Evaluation Period</label><input type="text" id="pe_period" placeholder="e.g., Q1 2026"></div>
  </div>
  <div class="form-group"><label>Work Quality (1-10)</label><input type="number" id="pe_quality" min="1" max="10" value="5"></div>
  <div class="form-group"><label>Productivity (1-10)</label><input type="number" id="pe_productivity" min="1" max="10" value="5"></div>
  <div class="form-group"><label>Teamwork (1-10)</label><input type="number" id="pe_teamwork" min="1" max="10" value="5"></div>
  <div class="form-group"><label>Communication (1-10)</label><input type="number" id="pe_comm" min="1" max="10" value="5"></div>
  <div class="form-group"><label>Attendance (1-10)</label><input type="number" id="pe_attend" min="1" max="10" value="5"></div>
  <div class="form-group"><label>Initiative (1-10)</label><input type="number" id="pe_init" min="1" max="10" value="5"></div>
  <div class="form-group"><label>Comments</label><textarea id="pe_comments"></textarea></div>
  <button class="btn-submit" onclick="pe_save()">Save Evaluation</button>
</div>
</div>

<!-- Modal: Add Feedback -->
<div class="modal-overlay" id="pe_modal_feedback">
<div class="modal-box">
  <button class="modal-close" onclick="pe_close('pe_modal_feedback')">&times;</button>
  <h2>360-Degree Feedback</h2>
  <div class="form-group"><label>Employee</label><input type="text" id="pe_fb_emp" readonly></div>
  <div class="form-group"><label>Feedback Type</label>
    <select id="pe_fb_type">
      <option>Manager Feedback</option>
      <option>Peer Feedback</option>
      <option>Self Assessment</option>
      <option>Subordinate Feedback</option>
    </select>
  </div>
  <div class="form-group"><label>Feedback Text</label><textarea id="pe_fb_text" placeholder="Provide constructive feedback..."></textarea></div>
  <div class="form-group"><label>Rating (1-10)</label><input type="number" id="pe_fb_rating" min="1" max="10" value="7"></div>
  <button class="btn-submit" onclick="pe_saveFeedback()">Submit Feedback</button>
</div>
</div>

<!-- Modal: Create Improvement Plan -->
<div class="modal-overlay" id="pe_modal_pip">
<div class="modal-box">
  <button class="modal-close" onclick="pe_close('pe_modal_pip')">&times;</button>
  <h2>Performance Improvement Plan</h2>
  <div class="form-group"><label>Employee</label><input type="text" id="pe_pip_emp" readonly></div>
  <div class="form-group"><label>Issues Identified</label><textarea id="pe_pip_issues" placeholder="What areas need improvement?"></textarea></div>
  <div class="form-group"><label>Goals & Action Items</label><textarea id="pe_pip_goals" placeholder="What specific goals should be achieved?"></textarea></div>
  <div class="form-group"><label>Target Completion Date</label><input type="date" id="pe_pip_date"></div>
  <button class="btn-submit" onclick="pe_savePIP()">Create Improvement Plan</button>
</div>
</div>

<script>
var EVALS=[],FEEDBACK=[],PIPS=[];
(function init(){
  try{if(window.parent!==window)document.body.classList.toggle('dark-mode',window.parent.document.body.classList.contains('dark-mode'));}catch(e){}
  EVALS=[
    {id:1,name:'Maria Santos',position:'Loan Officer',period:'Q4 2025',quality:9,productivity:8,teamwork:9,comm:9,attend:10,init:8,avg:8.8,rating:'Excellent',evaluator:'Juan Cruz',date:'2026-01-15',comments:'Outstanding performance'},
    {id:2,name:'Pedro Garcia',position:'IT Support',period:'Q4 2025',quality:6,productivity:5,teamwork:7,comm:6,attend:8,init:5,avg:6.2,rating:'Satisfactory',evaluator:'Ana Reyes',date:'2026-01-10',comments:'Meets basic expectations'},
    {id:3,name:'Jose Reyes',position:'Customer Service',period:'Q4 2025',quality:4,productivity:5,teamwork:4,comm:5,attend:6,init:4,avg:4.7,rating:'Needs Improvement',evaluator:'Juan Cruz',date:'2026-01-12',comments:'Requires performance improvement plan'},
  ];
  FEEDBACK=[
    {id:1,empId:1,empName:'Maria Santos',type:'Manager Feedback',from:'Juan Cruz',text:'Consistently exceeds expectations. Great team player.',rating:9,date:'2026-01-20'},
    {id:2,empId:1,empName:'Maria Santos',type:'Peer Feedback',from:'Ana Reyes',text:'Always willing to help others. Very reliable.',rating:9,date:'2026-01-18'},
    {id:3,empId:3,empName:'Jose Reyes',type:'Manager Feedback',from:'Juan Cruz',text:'Needs to improve response time and accuracy.',rating:5,date:'2026-01-15'},
  ];
  PIPS=[
    {id:1,empId:3,empName:'Jose Reyes',issues:'Slow response time, accuracy issues with client inquiries',goals:'Reduce response time to under 2 hours, achieve 95% accuracy rate',targetDate:'2026-03-15',status:'Active',createdDate:'2026-01-12'},
  ];
  pe_render();pe_updateStats();
})();
window.addEventListener('message',e=>{if(e.data&&e.data.type==='THEME')document.body.classList.toggle('dark-mode',e.data.dark);});
function pe_tab(t,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pe_tab_'+t).classList.add('active');if(btn)btn.classList.add('active');
  if(t==='feedback')pe_renderFeedback();
  if(t==='reports')pe_renderReports();
  if(t==='pip')pe_renderPIP();
}
function pe_open(id){try{if(window.parent!==window){window.parent.postMessage({type:'HR1_OPEN_MODAL',modalId:id},'*');return;}}catch(e){}document.getElementById(id).classList.add('active');}
function pe_close(id){try{if(window.parent!==window){window.parent.postMessage({type:'HR1_CLOSE_MODAL'},'*');return;}}catch(e){}document.getElementById(id).classList.remove('active');}
function pe_toast(msg,type){try{if(window.parent!==window){window.parent.postMessage({type:'HR1_TOAST',msg:msg,style:type||'success'},'*');return;}}catch(e){}}
function pe_openAdd(){pe_open('pe_modal_add');}
function g(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function getRating(avg){if(avg>=9)return'Excellent';if(avg>=7)return'Good';if(avg>=5)return'Satisfactory';return'Needs Improvement';}
function pe_save(){
  var name=g('pe_name'),pos=g('pe_position'),period=g('pe_period');
  if(!name||!pos||!period){pe_toast('Fill required fields','error');return;}
  var scores={quality:parseInt(g('pe_quality')),productivity:parseInt(g('pe_productivity')),teamwork:parseInt(g('pe_teamwork')),comm:parseInt(g('pe_comm')),attend:parseInt(g('pe_attend')),init:parseInt(g('pe_init'))};
  var avg=(scores.quality+scores.productivity+scores.teamwork+scores.comm+scores.attend+scores.init)/6;
  EVALS.push({id:Date.now(),name,position:pos,period,...scores,avg:Math.round(avg*10)/10,rating:getRating(avg),evaluator:'Current User',date:new Date().toLocaleDateString(),comments:g('pe_comments')});
  pe_close('pe_modal_add');
  ['pe_name','pe_position','pe_period','pe_comments'].forEach(id=>{var e=document.getElementById(id);if(e)e.value='';});
  pe_render();pe_updateStats();pe_toast(name+' evaluation saved!');
}
function pe_openFeedback(id){
  var ev=EVALS.find(e=>e.id==id);if(!ev)return;
  document.getElementById('pe_fb_emp').value=ev.name;
  document.getElementById('pe_fb_emp').dataset.empId=id;
  pe_open('pe_modal_feedback');
}
function pe_saveFeedback(){
  var empId=document.getElementById('pe_fb_emp').dataset.empId;
  var ev=EVALS.find(e=>e.id==empId);if(!ev)return;
  FEEDBACK.push({id:Date.now(),empId,empName:ev.name,type:g('pe_fb_type'),from:'Current User',text:g('pe_fb_text'),rating:parseInt(g('pe_fb_rating')),date:new Date().toLocaleDateString()});
  pe_close('pe_modal_feedback');
  pe_toast('Feedback submitted for '+ev.name);
}
function pe_openPIP(id){
  var ev=EVALS.find(e=>e.id==id);if(!ev)return;
  document.getElementById('pe_pip_emp').value=ev.name;
  document.getElementById('pe_pip_emp').dataset.empId=id;
  pe_open('pe_modal_pip');
}
function pe_savePIP(){
  var empId=document.getElementById('pe_pip_emp').dataset.empId;
  var ev=EVALS.find(e=>e.id==empId);if(!ev)return;
  PIPS.push({id:Date.now(),empId,empName:ev.name,issues:g('pe_pip_issues'),goals:g('pe_pip_goals'),targetDate:g('pe_pip_date'),status:'Active',createdDate:new Date().toLocaleDateString()});
  pe_close('pe_modal_pip');
  pe_updateStats();
  pe_toast('Improvement Plan created for '+ev.name);
}
function pe_render(){
  var el=document.getElementById('pe_list');if(!el)return;
  el.innerHTML=EVALS.map(e=>'<div class="eval-card"><div style="display:flex;justify-content:space-between;margin-bottom:12px;"><div><div style="font-size:16px;font-weight:700;">'+e.name+'</div><div style="font-size:12px;color:var(--text-secondary);">'+e.position+' • '+e.period+'</div></div><span class="badge bd-'+e.rating.toLowerCase().replace(' ','-')+'">'+e.rating+'</span></div><div class="score-grid"><div class="score-item"><div class="score-val">'+e.quality+'</div><div class="score-lbl">Quality</div></div><div class="score-item"><div class="score-val">'+e.productivity+'</div><div class="score-lbl">Productivity</div></div><div class="score-item"><div class="score-val">'+e.teamwork+'</div><div class="score-lbl">Teamwork</div></div><div class="score-item"><div class="score-val">'+e.comm+'</div><div class="score-lbl">Communication</div></div><div class="score-item"><div class="score-val">'+e.attend+'</div><div class="score-lbl">Attendance</div></div><div class="score-item"><div class="score-val">'+e.init+'</div><div class="score-lbl">Initiative</div></div></div><div style="text-align:center;margin:12px 0;padding:12px;background:var(--background);border-radius:8px;"><div style="font-size:32px;font-weight:700;color:var(--brand-green);">'+e.avg+'</div><div style="font-size:11px;color:var(--text-secondary);">Overall Score</div></div><div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">'+e.comments+'</div><div style="display:flex;gap:8px;"><button class="btn-sm bsm-blue" onclick="pe_openFeedback('+e.id+')">Add Feedback</button>'+(e.rating==='Needs Improvement'?'<button class="btn-sm bsm-amber" onclick="pe_openPIP('+e.id+')">Create PIP</button>':'')+'</div></div>').join('');
}
function pe_renderFeedback(){
  var el=document.getElementById('pe_feedback');if(!el)return;
  el.innerHTML='<div style="margin-bottom:16px;"><h3>360-Degree Feedback</h3></div>'+
    (FEEDBACK.length?'<div class="feedback-list">'+FEEDBACK.map(f=>'<div class="feedback-item"><div class="feedback-meta"><span><strong>'+f.type+'</strong> for '+f.empName+'</span><span>'+f.date+'</span></div><div style="font-size:13px;margin-bottom:6px;">'+f.text+'</div><div style="font-size:12px;color:var(--text-secondary);">From: '+f.from+' • Rating: '+f.rating+'/10</div></div>').join('')+'</div>':'<p style="text-align:center;color:var(--text-secondary);padding:40px;">No feedback yet</p>');
}
function pe_renderReports(){
  var el=document.getElementById('pe_reports');if(!el)return;
  el.innerHTML='<h3 style="margin-bottom:16px;">Evaluation Reports & Analytics</h3><div style="background:var(--surface);border:1px solid var(--border-color);border-radius:14px;padding:24px;margin-bottom:16px;"><h4 style="margin-bottom:12px;">Overall Performance Summary</h4><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:16px;"><div style="text-align:center;padding:16px;background:var(--background);border-radius:10px;"><div style="font-size:24px;font-weight:700;color:var(--brand-green);">'+EVALS.filter(e=>e.rating==='Excellent').length+'</div><div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">Excellent</div></div><div style="text-align:center;padding:16px;background:var(--background);border-radius:10px;"><div style="font-size:24px;font-weight:700;color:#3b82f6;">'+EVALS.filter(e=>e.rating==='Good').length+'</div><div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">Good</div></div><div style="text-align:center;padding:16px;background:var(--background);border-radius:10px;"><div style="font-size:24px;font-weight:700;color:#f59e0b;">'+EVALS.filter(e=>e.rating==='Satisfactory').length+'</div><div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">Satisfactory</div></div><div style="text-align:center;padding:16px;background:var(--background);border-radius:10px;"><div style="font-size:24px;font-weight:700;color:#ef4444;">'+EVALS.filter(e=>e.rating==='Needs Improvement').length+'</div><div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">Needs Improvement</div></div></div></div><button class="btn-primary" onclick="alert(\'Generate PDF Report - Coming soon!\')">📄 Generate Full Report</button>';
}
function pe_renderPIP(){
  var el=document.getElementById('pe_pip');if(!el)return;
  el.innerHTML='<h3 style="margin-bottom:16px;">Performance Improvement Plans</h3>'+
    (PIPS.length?PIPS.map(p=>'<div class="pip-card"><div class="pip-header"><div><h4>'+p.empName+'</h4><div style="font-size:12px;color:var(--text-secondary);">Created: '+p.createdDate+' • Target: '+p.targetDate+'</div></div><span class="pip-status pip-'+p.status.toLowerCase()+'">'+p.status+'</span></div><div style="margin-bottom:12px;"><strong style="display:block;font-size:13px;margin-bottom:4px;">Issues Identified:</strong><div style="font-size:13px;color:var(--text-secondary);">'+p.issues+'</div></div><div><strong style="display:block;font-size:13px;margin-bottom:4px;">Goals & Action Items:</strong><div style="font-size:13px;color:var(--text-secondary);">'+p.goals+'</div></div></div>').join(''):'<p style="text-align:center;color:var(--text-secondary);padding:40px;">No improvement plans</p>');
}
function pe_updateStats(){
  var fn=(id,v)=>{var e=document.getElementById(id);if(e)e.textContent=v;};
  fn('pe_s_total',EVALS.length);
  fn('pe_s_excellent',EVALS.filter(e=>e.rating==='Excellent').length);

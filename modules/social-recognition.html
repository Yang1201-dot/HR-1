<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Social Recognition</title>
<style>
:root{--brand-green:#2ca078;--button-hover:#4fb97a;--background:#f8f9fa;--surface:#ffffff;--surface-hover:#f5f5f5;--text-primary:#111827;--text-secondary:#6b7280;--text-tertiary:#9ca3af;--border-color:#e5e7eb;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);}
.dark-mode{--background:#0a0a0a;--surface:#1a1a1a;--surface-hover:#252525;--text-primary:#f9fafb;--text-secondary:#d1d5db;--text-tertiary:#9ca3af;--border-color:#2d2d2d;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--background);color:var(--text-primary);line-height:1.6;transition:background .3s,color .3s;}
input,select,textarea,button{font-family:inherit;}
.hr-content{padding:32px;}
.page-title{font-size:24px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:14px;color:var(--text-secondary);margin-bottom:24px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:8px;}
.btn-primary{padding:10px 20px;background:var(--brand-green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-primary:hover{background:var(--button-hover);transform:translateY(-1px);}
.btn-sm{padding:5px 12px;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.bsm-blue{background:rgba(59,130,246,.12);color:#3b82f6;}.bsm-blue:hover{background:#3b82f6;color:#fff;}
.bsm-green{background:rgba(44,160,120,.12);color:var(--brand-green);}.bsm-green:hover{background:var(--brand-green);color:#fff;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border-color);border-radius:14px;padding:20px;text-align:center;box-shadow:var(--shadow);transition:all .2s;}
.stat-num{font-size:30px;font-weight:700;margin-bottom:4px;}
.c-green{color:var(--brand-green);}.c-blue{color:#3b82f6;}.c-amber{color:#f59e0b;}.c-purple{color:#8b5cf6;}
.stat-label{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.tab-bar{display:flex;gap:4px;border-bottom:1px solid var(--border-color);margin-bottom:24px;flex-wrap:wrap;}
.tab-btn{padding:10px 18px;border:none;background:none;color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;border-radius:8px 8px 0 0;}
.tab-btn.active{color:var(--brand-green);border-bottom-color:var(--brand-green);}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.feed-container{max-width:680px;margin:0 auto;}
.rec-card{background:var(--surface);border:1px solid var(--border-color);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow);transition:all .2s;}
.rec-header{display:flex;gap:12px;margin-bottom:12px;}
.avatar{width:48px;height:48px;border-radius:12px;background:var(--brand-green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.rec-info{flex:1;}
.rec-name{font-size:15px;font-weight:700;}
.rec-meta{font-size:12px;color:var(--text-secondary);margin-top:2px;}
.rec-category{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(44,160,120,.12);color:var(--brand-green);text-transform:uppercase;letter-spacing:.4px;}
.rec-message{font-size:14px;line-height:1.7;margin:12px 0;}
.rec-footer{display:flex;gap:16px;padding-top:12px;border-top:1px solid var(--border-color);}
.rec-action{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:var(--background);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.rec-action:hover{background:var(--surface-hover);}
.rec-action.liked{color:var(--brand-green);}
.leaderboard{display:flex;flex-direction:column;gap:12px;}
.leader-item{background:var(--surface);border:1px solid var(--border-color);border-radius:12px;padding:16px;display:flex;align-items:center;gap:16px;transition:all .2s;}
.leader-item:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
.leader-rank{font-size:24px;font-weight:700;color:var(--text-secondary);width:40px;text-align:center;}
.leader-rank.top3{color:var(--brand-green);}
.leader-info{flex:1;}
.leader-name{font-size:15px;font-weight:700;}
.leader-dept{font-size:12px;color:var(--text-secondary);}
.leader-points{font-size:24px;font-weight:700;color:var(--brand-green);}
.chart-container{background:var(--surface);border:1px solid var(--border-color);border-radius:14px;padding:24px;margin-bottom:16px;}
.chart-title{font-size:18px;font-weight:700;margin-bottom:16px;}
.bar-chart{display:flex;flex-direction:column;gap:12px;}
.bar-row{display:flex;align-items:center;gap:12px;}
.bar-label{width:120px;font-size:13px;font-weight:600;}
.bar-track{flex:1;height:32px;background:var(--background);border-radius:8px;position:relative;overflow:hidden;}
.bar-fill{height:100%;background:var(--brand-green);border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding:0 12px;color:#fff;font-weight:700;font-size:13px;transition:width .5s ease;}
.modal-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.active{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border-color);border-radius:16px;padding:28px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.2);}
.modal-box h2{font-size:20px;font-weight:700;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border-color);}
.modal-close{position:absolute;top:20px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-secondary);}
.form-group{margin-bottom:16px;}
.form-group label{display:block;margin-bottom:6px;font-size:13px;font-weight:600;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border-color);border-radius:10px;background:var(--background);color:var(--text-primary);font-size:14px;}
.form-group textarea{min-height:100px;resize:vertical;}
.btn-submit{width:100%;padding:12px;background:var(--brand-green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
</style>
</head>
<body>
<div class="hr-content">
  <div class="page-header">
    <div><h1 class="page-title">Social Recognition</h1><p class="page-sub">Employee awards, recognition reports, nominations, and recognition history</p></div>
    <button class="btn-primary" onclick="sr_openAdd()">+ Give Recognition</button>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num c-green" id="sr_s_total">0</div><div class="stat-label">Total Awards</div></div>
    <div class="stat-card"><div class="stat-num c-blue" id="sr_s_month">0</div><div class="stat-label">This Month</div></div>
    <div class="stat-card"><div class="stat-num c-purple" id="sr_s_categories">5</div><div class="stat-label">Categories</div></div>
    <div class="stat-card"><div class="stat-num c-amber" id="sr_s_points">0</div><div class="stat-label">Points Given</div></div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="sr_tab('feed',this)">Recognition Feed</button>
    <button class="tab-btn" onclick="sr_tab('leaderboard',this)">Leaderboard</button>
    <button class="tab-btn" onclick="sr_tab('reports',this)">Recognition Reports</button>
    <button class="tab-btn" onclick="sr_tab('history',this)">History</button>
  </div>
  <div class="tab-panel active" id="sr_tab_feed"><div class="feed-container" id="sr_feed"></div></div>
  <div class="tab-panel" id="sr_tab_leaderboard"><div id="sr_leaderboard"></div></div>
  <div class="tab-panel" id="sr_tab_reports"><div id="sr_reports"></div></div>
  <div class="tab-panel" id="sr_tab_history"><div id="sr_history"></div></div>
</div>

<!-- Modal: Give Recognition -->
<div class="modal-overlay" id="sr_modal_add">
<div class="modal-box">
  <button class="modal-close" onclick="sr_close('sr_modal_add')">&times;</button>
  <h2>Give Recognition</h2>
  <div class="form-group"><label>Recipient</label><input type="text" id="sr_recipient" placeholder="Employee name"></div>
  <div class="form-group"><label>Category</label>
    <select id="sr_category">
      <option>Excellence</option>
      <option>Teamwork</option>
      <option>Innovation</option>
      <option>Leadership</option>
      <option>Customer Service</option>
    </select>
  </div>
  <div class="form-group"><label>Recognition Message</label><textarea id="sr_message" placeholder="Write why you're recognizing this person..."></textarea></div>
  <div class="form-group"><label>Points to Award</label><input type="number" id="sr_points" min="10" max="100" value="50"></div>
  <button class="btn-submit" onclick="sr_save()">Give Recognition</button>
</div>
</div>

<script>
(function() {
  'use strict';
  
  function isInIframe() {
    try {
      return window.self !== window.top;
    } catch (e) {
      return true;
    }
  }
  
  function getModuleName() {
    var path = window.location.pathname;
    var filename = path.split('/').pop();
    return filename.replace('.html', '');
  }
  
  function redirectToDashboard(moduleName) {
    var dashboardUrl = window.location.pathname.replace(/\/[^\/]*$/, '/dashboard.html');
    var separator = dashboardUrl.includes('?') ? '&' : '?';
    var targetUrl = dashboardUrl + separator + 'module=' + encodeURIComponent(moduleName);
    window.location.replace(targetUrl);
  }
  
  if (!isInIframe()) {
    var moduleName = getModuleName();
    console.log('Module loaded standalone, redirecting to dashboard with module:', moduleName);
    
    document.body.innerHTML = `
      <div style="
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f8f9fa;
        color: #2ca078;
        font-size: 18px;
        font-weight: 600;
      ">
        <div style="text-align: center;">
          <div style="
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #2ca078;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
          "></div>
          Loading HR Dashboard...
        </div>
      </div>
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    `;
    
    setTimeout(function() {
      redirectToDashboard(moduleName);
    }, 500);
    return;
  } else {
    console.log('Module loaded in dashboard context');
  }
})();

var RECS=[],LIKES={};
(function init(){
  try{if(window.parent!==window)document.body.classList.toggle('dark-mode',window.parent.document.body.classList.contains('dark-mode'));}catch(e){}
  RECS=[
    {id:1,recipient:'Maria Santos',from:'Juan Cruz',category:'Excellence',message:'Outstanding work on the Q4 loan processing initiative. Reduced processing time by 30%!',points:100,likes:15,date:'2 hours ago',dept:'Lending Operations'},
    {id:2,recipient:'Pedro Garcia',from:'Ana Reyes',category:'Teamwork',message:'Always willing to help teammates. Great collaboration on the new system rollout.',points:75,likes:8,date:'1 day ago',dept:'Information Technology'},
    {id:3,recipient:'Jose Reyes',from:'Maria Santos',category:'Customer Service',message:'Received multiple positive feedback from clients for excellent service.',points:50,likes:6,date:'2 days ago',dept:'Customer Service'},
  ];
  LIKES={};
  sr_render();sr_updateStats();
})();
window.addEventListener('message',e=>{if(e.data&&e.data.type==='THEME')document.body.classList.toggle('dark-mode',e.data.dark);});
function sr_tab(t,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sr_tab_'+t).classList.add('active');if(btn)btn.classList.add('active');
  if(t==='leaderboard')sr_renderLeaderboard();
  if(t==='reports')sr_renderReports();
  if(t==='history')sr_renderHistory();
}
function sr_open(id){try{if(window.parent!==window){window.parent.postMessage({type:'HR1_OPEN_MODAL',modalId:id},'*');return;}}catch(e){}document.getElementById(id).classList.add('active');}
function sr_close(id){try{if(window.parent!==window){window.parent.postMessage({type:'HR1_CLOSE_MODAL'},'*');return;}}catch(e){}document.getElementById(id).classList.remove('active');}
function sr_toast(msg,type){try{if(window.parent!==window){window.parent.postMessage({type:'HR1_TOAST',msg:msg,style:type||'success'},'*');return;}}catch(e){}}
function sr_openAdd(){sr_open('sr_modal_add');}
function g(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function sr_save(){
  var recipient=g('sr_recipient'),msg=g('sr_message');
  if(!recipient||!msg){sr_toast('Fill required fields','error');return;}
  RECS.unshift({id:Date.now(),recipient,from:'Current User',category:g('sr_category'),message:msg,points:parseInt(g('sr_points')),likes:0,date:'Just now',dept:'Department'});
  sr_close('sr_modal_add');
  ['sr_recipient','sr_message'].forEach(id=>{var e=document.getElementById(id);if(e)e.value='';});
  sr_render();sr_updateStats();sr_toast('Recognition sent to '+recipient+'!');
}
function sr_like(id){
  if(LIKES[id]){RECS.find(r=>r.id==id).likes--;delete LIKES[id];}
  else{RECS.find(r=>r.id==id).likes++;LIKES[id]=true;}
  sr_render();
}
function sr_render(){
  var el=document.getElementById('sr_feed');if(!el)return;
  el.innerHTML=RECS.map(r=>'<div class="rec-card"><div class="rec-header"><div class="avatar">'+r.recipient[0]+'</div><div class="rec-info"><div class="rec-name">'+r.recipient+'</div><div class="rec-meta">Recognized by '+r.from+' • '+r.date+'</div></div><span class="rec-category">'+r.category+'</span></div><div class="rec-message">'+r.message+'</div><div class="rec-footer"><div class="rec-action'+(LIKES[r.id]?' liked':'')+'" onclick="sr_like('+r.id+')"><span>👍</span><span>'+r.likes+'</span></div><div class="rec-action"><span>🏆</span><span>'+r.points+' pts</span></div></div></div>').join('');
}
function sr_renderLeaderboard(){
  var el=document.getElementById('sr_leaderboard');if(!el)return;
  var leaders=[
    {rank:1,name:'Maria Santos',dept:'Lending Operations',points:450},
    {rank:2,name:'Pedro Garcia',dept:'Information Technology',points:320},
    {rank:3,name:'Ana Reyes',dept:'Human Resources',points:280},
    {rank:4,name:'Jose Reyes',dept:'Customer Service',points:210},
    {rank:5,name:'Juan Cruz',dept:'Finance & Accounting',points:180},
  ];
  el.innerHTML='<h3 style="margin-bottom:16px;">Top Performers - This Quarter</h3><div class="leaderboard">'+
    leaders.map(l=>'<div class="leader-item"><div class="leader-rank'+(l.rank<=3?' top3':'')+'">'+l.rank+'</div><div class="avatar">'+l.name[0]+'</div><div class="leader-info"><div class="leader-name">'+l.name+'</div><div class="leader-dept">'+l.dept+'</div></div><div class="leader-points">'+l.points+'</div></div>').join('')+
  '</div>';
}
function sr_renderReports(){
  var el=document.getElementById('sr_reports');if(!el)return;
  var catData={Excellence:5,Teamwork:8,Innovation:3,Leadership:4,'Customer Service':6};
  var deptData={'Lending Operations':12,'Information Technology':8,'Customer Service':10,'Human Resources':6,'Finance & Accounting':5};
  el.innerHTML='<h2 style="margin-bottom:24px;">Recognition Reports & Analytics</h2>'+
    '<div class="chart-container"><div class="chart-title">Recognition by Category</div><div class="bar-chart">'+
      Object.keys(catData).map(cat=>'<div class="bar-row"><div class="bar-label">'+cat+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.min(100,catData[cat]*10)+'%">'+catData[cat]+'</div></div></div>').join('')+
    '</div></div>'+
    '<div class="chart-container"><div class="chart-title">Recognition by Department</div><div class="bar-chart">'+
      Object.keys(deptData).map(dept=>'<div class="bar-row"><div class="bar-label">'+dept+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.min(100,deptData[dept]*8)+'%">'+deptData[dept]+'</div></div></div>').join('')+
    '</div></div>'+
    '<div class="chart-container"><h4 style="margin-bottom:12px;">Key Insights</h4><ul style="list-style:none;padding:0;"><li style="padding:8px 0;border-bottom:1px solid var(--border-color);">📈 <strong>26 recognitions</strong> given this month (+15% vs last month)</li><li style="padding:8px 0;border-bottom:1px solid var(--border-color);">🏆 <strong>Teamwork</strong> is the most common recognition category</li><li style="padding:8px 0;border-bottom:1px solid var(--border-color);">⭐ <strong>Lending Operations</strong> leads in total recognitions received</li><li style="padding:8px 0;">💡 <strong>Innovation</strong> recognition is trending up this quarter</li></ul></div>'+
    '<button class="btn-primary" onclick="alert(\'Export Report - Coming soon!\')">📊 Export Full Report</button>';
}
function sr_renderHistory(){
  var el=document.getElementById('sr_history');if(!el)return;
  el.innerHTML='<h3 style="margin-bottom:16px;">Recognition History</h3>'+
    '<div class="feed-container">'+RECS.map(r=>'<div class="rec-card"><div style="display:flex;justify-content:space-between;margin-bottom:12px;"><div><div style="font-weight:700;">'+r.recipient+'</div><div style="font-size:12px;color:var(--text-secondary);">'+r.category+' • '+r.date+'</div></div><span style="font-weight:700;color:var(--brand-green);">'+r.points+' pts</span></div><div style="font-size:13px;color:var(--text-secondary);">'+r.message+'</div></div>').join('')+'</div>';
}
function sr_updateStats(){
  var fn=(id,v)=>{var e=document.getElementById(id);if(e)e.textContent=v;};
  fn('sr_s_total',RECS.length);
  fn('sr_s_month',RECS.filter(r=>r.date.includes('hour')||r.date.includes('day')||r.date==='Just now').length);
  fn('sr_s_points',RECS.reduce((sum,r)=>sum+r.points,0));
}
</script>
</body>
</html>

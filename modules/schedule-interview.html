<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Interview</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/recruitment.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background, #f8fafc);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color, #e2e8f0);
        }
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--surface, #ffffff);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color, #e2e8f0);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--text-secondary, #64748b);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: var(--text-primary, #374151);
            transform: translateY(-1px);
        }
        .success-message {
            background: #10b981;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="recruitment.html" class="back-btn">
            <i data-lucide="arrow-left" size="16"></i>
            Back to Recruitment
        </a>
        <h1>Schedule Interview</h1>
    </div>

    <div id="success-message" class="success-message" style="display: none;">
        Interview scheduled successfully!
    </div>

    <div class="form-container">
        <form id="interview-form">
            <div class="form-group">
                <label>Applicant Name <span class="req">*</span></label>
                <select id="applicant_id" required>
                    <option value="">Select Applicant</option>
                </select>
            </div>

            <div class="form-group">
                <label>Interview Date <span class="req">*</span></label>
                <input type="date" id="interview_date" required>
            </div>

            <div class="form-group">
                <label>Interview Time <span class="req">*</span></label>
                <input type="time" id="interview_time" required>
            </div>

            <div class="form-group">
                <label>Interview Type</label>
                <select id="interview_type">
                    <option value="Phone Screen">Phone Screen</option>
                    <option value="Video Call">Video Call</option>
                    <option value="In-Person">In-Person Interview</option>
                    <option value="Technical">Technical Assessment</option>
                    <option value="Panel">Panel Interview</option>
                </select>
            </div>

            <div class="form-group">
                <label>Interview Notes</label>
                <textarea id="interview_notes" rows="4" placeholder="Add any notes about this interview..."></textarea>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn-submit">
                    Schedule Interview
                </button>
                <button type="button" class="btn-cancel-modal" onclick="window.location.href='recruitment.html'">
                    Cancel
                </button>
            </div>
        </form>
    </div>

    <script>
        // Initialize Lucide icons
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }

        // Load applicants from API
        async function loadApplicants() {
            try {
                const response = await fetch('../api/simple-api-new.php?action=get_applications');
                const data = await response.json();
                
                const select = document.getElementById('applicant_id');
                select.innerHTML = '<option value="">Select Applicant</option>';
                
                data.forEach(applicant => {
                    if (applicant.status === 'New' || applicant.status === 'Under Review' || applicant.status === 'Shortlisted') {
                        const option = document.createElement('option');
                        option.value = applicant.id;
                        option.textContent = `${applicant.first_name} ${applicant.last_name} - ${applicant.position}`;
                        select.appendChild(option);
                    }
                });
            } catch (error) {
                console.error('Error loading applicants:', error);
                alert('Error loading applicants. Please try again.');
            }
        }

        // Handle form submission
        document.getElementById('interview-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                applicant_id: document.getElementById('applicant_id').value,
                interview_date: document.getElementById('interview_date').value,
                interview_time: document.getElementById('interview_time').value,
                interview_type: document.getElementById('interview_type').value,
                interview_notes: document.getElementById('interview_notes').value
            };

            if (!formData.applicant_id || !formData.interview_date || !formData.interview_time) {
                alert('Please fill in all required fields.');
                return;
            }

            try {
                const response = await fetch('../api/simple-api-new.php?action=schedule_interview', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams(formData)
                });

                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('success-message').style.display = 'block';
                    document.getElementById('interview-form').reset();
                    
                    setTimeout(() => {
                        window.location.href = 'recruitment.html';
                    }, 2000);
                } else {
                    alert('Error scheduling interview: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error scheduling interview:', error);
                alert('Error scheduling interview. Please try again.');
            }
        });

        // Load applicants when page loads
        document.addEventListener('DOMContentLoaded', loadApplicants);
    </script>
</body>
</html>

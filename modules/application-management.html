              </div>

<script>
// ── THEME SYNC ───────────────────────────────────────────
// Listen for theme changes from parent window
window.addEventListener('message', function(event) {
  if (event.data.type === 'THEME') {
    if (event.data.dark) {
      document.body.classList.add('dark-mode');
    } else {
      document.body.classList.remove('dark-mode');
    }
  }
});

// Apply saved theme on load
const savedTheme = localStorage.getItem('theme') || 'light';
if (savedTheme === 'dark') {
  document.body.classList.add('dark-mode');
}

// ── Standalone redirect detection ──
(function() {
  'use strict';
  
  function isInIframe() {
    try {
      return window.self !== window.top;
    } catch (e) {
      return true;
    }
  }
  
  function getModuleName() {
    var path = window.location.pathname;
    var filename = path.split('/').pop();
    return filename.replace('.html', '');
  }
  
  function redirectToDashboard(moduleName) {
    var dashboardUrl = window.location.pathname.replace(/\/[^\/]*$/, '/dashboard.html');
    var separator = dashboardUrl.includes('?') ? '&' : '?';
    var targetUrl = dashboardUrl + separator + 'module=' + encodeURIComponent(moduleName);
    window.location.replace(targetUrl);
  }
  
  if (!isInIframe()) {
    var moduleName = getModuleName();
    console.log('Module loaded standalone, redirecting to dashboard with module:', moduleName);
    
    document.body.innerHTML = `
      <div style="
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f8f9fa;
        color: #2ca078;
        font-size: 18px;
        font-weight: 600;
      ">
        <div style="text-align: center;">
          <div style="
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #2ca078;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
          "></div>
          Loading HR Dashboard...
        </div>
      </div>
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    `;
    
    setTimeout(function() {
      redirectToDashboard(moduleName);
    }, 500);
    return;
  } else {
    console.log('Module loaded in dashboard context');
  }
})();
/* ── Global File Functions - MUST BE DEFINED FIRST ── */
console.log('Defining global functions...');
window.am_viewFile = function(appId, key) {
  console.log('am_viewFile called with:', appId, key);
  try {
    var numericId = parseInt(appId);
    var file = (FILES[numericId] && FILES[numericId][key]) ? FILES[numericId][key] : null;
    if (!file) { alert('File not found.'); return; }
    
    var viewUrl = '../api/file-download.php?applicant_id=' + appId + '&file_key=' + key + '&view=1';
    console.log('Opening file view URL:', viewUrl);
    
    var win = window.open(viewUrl, '_blank');
    if (!win) { alert('Popup blocked. Please allow popups for this site.'); return; }
  } catch(e) { 
    console.error('Error viewing file:', e);
    alert('Error loading file.'); 
  }
};
window.am_downloadFile = function(appId, key) {
  console.log('am_downloadFile called with:', appId, key);
  try {
    var numericId = parseInt(appId);
    var file = (FILES[numericId] && FILES[numericId][key]) ? FILES[numericId][key] : null;
    if (!file) { alert('File not found.'); return; }
    
    var downloadUrl = '../api/file-download.php?applicant_id=' + appId + '&file_key=' + key;
    console.log('Downloading file URL:', downloadUrl);
    
    var a = document.createElement('a');
    a.href = downloadUrl;
    a.download = file.fileName || 'download';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch(e) { 
    console.error('Error downloading file:', e);
    alert('Error downloading file.'); 
  }
};
console.log('Functions defined:', typeof window.am_viewFile, typeof window.am_downloadFile);
function am_toast(msg, type) {
  try { if (window.parent !== window) { window.parent.postMessage({type:'HR1_TOAST',msg:msg,style:type||'success'},'*'); return; } } catch(e) {}
  alert(msg);
}
function am_open(id) {
  try { if (window.parent !== window) { window.parent.postMessage({type:'HR1_OPEN_MODAL',modalId:id},'*'); return; } } catch(e) {}
  document.getElementById(id).classList.add('active');
}
function am_close(id) {
  try { if (window.parent !== window) { window.parent.postMessage({type:'HR1_CLOSE_MODAL'},'*'); return; } } catch(e) {}
  document.getElementById(id).classList.remove('active');
}
function g(id) { var e = document.getElementById(id); return e ? e.value.trim() : ''; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
// Define the function directly on the window object
window.am_updateApplicantStatus = function(applicantId) {
  var statusDropdown = document.getElementById('applicant_status_' + applicantId);
  if (!statusDropdown) return;
  
  var newStatus = statusDropdown.value;
  var applicant = AM.find(function(a) { return String(a.id) === String(applicantId); });
  if (!applicant) return;
  
  // Update applicant's status via API
  fetch('../api/simple-api-new.php?action=update_status', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded'
    },
    body: 'id=' + applicantId + '&status=' + newStatus
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      // Update local data
      applicant.status = newStatus;
      
      // Refresh applications table
      am_render();
      
      // Update statistics
      am_updateStats();
      
      // Show success message
      console.log('Status updated successfully for applicant:', applicantId);
      
      // Refresh applicant details view if it's open
      var viewModal = document.getElementById('am_modal_view');
      if (viewModal && viewModal.classList.contains('active')) {
        var currentApplicantId = document.getElementById('am_assess_name').dataset.applicantId;
        if (currentApplicantId === applicantId) {
          am_viewApplicant(applicantId);
        }
      }
    } else {
      console.error('Failed to update status:', data.error);
    }
  })
  .catch(error => {
    console.error('Error updating status:', error);
  });
};
// Also keep the regular function definition for backward compatibility
function am_updateApplicantStatus(applicantId) {
  return window.am_updateApplicantStatus(applicantId);
}

/* ── SVG icons stored as variables (NEVER nest SVG strings inside other string literals) ── */
var SVG = {

var FILE_CATS = [
  { key: 'resume',  label: 'Resume / CV Library',       icon: 'resume'  },
  { key: 'birth',   label: 'Birth Certificate Library', icon: 'birth'   },

/* ── Data ── */
var AM = [], FILES = {}, ASSESS = [], COMM = [];
/* ── Storage ── */
async function am_load() {
  console.log('Starting am_load function...');
  try {
    const response = await fetch('../api/simple-api-new.php?action=get_applications');
    const data = await response.json();
    console.log('API Response:', data);
    AM = data.error ? [] : data;
    console.log('AM loaded:', AM);
  } catch(e) {
    console.error('Failed to load applicants:', e);
    AM = [];
  }
  
  try {
    const response = await fetch('../api/simple-api-new.php?action=get_assessments');
    const data = await response.json();
    console.log('Assessments API Response:', data);
    ASSESS = data.error ? [] : data;
    console.log('ASSESS loaded:', ASSESS);
  } catch(e) {
    console.error('Failed to load assessments:', e);
    ASSESS = [];
  }
  
  try {
    const response = await fetch('../api/simple-api-new.php?action=get_communications');
    const data = await response.json();
    console.log('Communications API Response:', data);
    COMM = data.error ? [] : data;
    console.log('COMM loaded:', COMM);
  } catch(e) {
    console.error('Failed to load communications:', e);
    COMM = [];
  }
  
  // Load files from applicant_files table
  try {
    const filesResponse = await fetch('../api/simple-api-new.php?action=get_applicant_files');
    const filesData = await filesResponse.json();
    console.log('Files API Response:', filesData);
    FILES = {};
    if (Array.isArray(filesData)) {
      filesData.forEach(function(file) {
        console.log('Processing file:', file);
        const applicantId = file.applicant_id;
        console.log('Applicant ID:', applicantId);
        if (!FILES[applicantId]) {
          FILES[applicantId] = {};
        }
        let category = null;
        const fileName = (file.file_name || '').toLowerCase();
        console.log('File name:', fileName);
        
        // Enhanced categorization logic using form field names
        if (file.file_field) {
          // Use the form field name for perfect categorization
          const fieldCategory = file.file_field.toLowerCase();
          if (fieldCategory === 'resume') {
            category = 'resume';
          } else if (fieldCategory === 'birth_certificate') {
            category = 'birth';
          } else if (fieldCategory === 'diploma') {
            category = 'diploma';
          } else if (fieldCategory === 'cover_letter') {
            category = 'cover';
          }
        }
        
        // Fallback to filename-based categorization if field name is missing
        if (!category) {
          if (fileName.includes('resume') || fileName.includes('cv')) {
            category = 'resume';
          } else if (fileName.includes('birth') || fileName.includes('certificate') || fileName.includes('nso') || fileName.includes('psa')) {
            category = 'birth';
          } else if (fileName.includes('diploma') || fileName.includes('tor') || fileName.includes('transcript') || fileName.includes('grades') || fileName.includes('report')) {
            category = 'diploma';
          } else if (fileName.includes('cover') || fileName.includes('letter') || fileName.includes('application')) {
            category = 'cover';
          } else {
            // Last resort - categorize based on file type
            if (file.file_type.startsWith('image/')) {
              category = 'diploma';
            } else {
              category = 'resume';
            }
          }
        }
        console.log('Determined category:', category);
        if (category) {
          const fileSize = file.file_size ? (file.file_size / 1024).toFixed(1) + ' KB' : '0 KB';
          const uploadedAt = file.uploaded_at ? new Date(file.uploaded_at).toLocaleString() : '';
          // Only store one file per category per applicant
          if (!FILES[applicantId][category] || file.uploaded_at > FILES[applicantId][category].uploadedAt) {
            FILES[applicantId][category] = {
              fileName: file.file_name,
              fileSize: fileSize,
              uploadedAt: uploadedAt,
              applicantName: file.applicant_name,
              filePath: file.file_path,
              fileType: file.file_type,
              fileId: file.id
            };
            console.log('Updated file to FILES[' + applicantId + '][' + category + ']:', FILES[applicantId][category]);
          } else {
            console.log('Skipped older file for FILES[' + applicantId + '][' + category + ']');
          }
          console.log('Added file to FILES[' + applicantId + '][' + category + ']:', FILES[applicantId][category]);
        } else {
          console.log('No category found for file:', fileName);
        }
      });
    }
    console.log('FILES organized:', FILES);
  } catch(e) {
    console.error('Failed to load files:', e);
    FILES = {};
  }
  
  console.log('FILES loaded:', FILES);
  console.log('FILES keys:', Object.keys(FILES));
  console.log('About to call am_render()...');
  am_render();
  console.log('am_render() called');
  document.body.classList.toggle('dark-mode', window.parent.document.body.classList.contains('dark-mode'));
  console.log('Updating statistics after data load...');
  am_updateStats();
}
am_load();
am_render();
am_updateStats();
/* ── Tabs ── */
function am_tab(t, btn) {
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('am_tab_' + t).classList.add('active');
  if (btn) btn.classList.add('active');
  if (t === 'resumes')       { am_load().then(() => am_renderResumes()); }
  if (t === 'assessments')   am_renderAssess();
  if (t === 'communication') am_renderComms();
}
function am_render() {
  var tbody = document.getElementById('am_tbody');
  if (!tbody) return;
  if (!AM.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-full">No applications yet. They will appear here after someone applies on the Careers website.</td></tr>';
    return;
  }
  tbody.innerHTML = AM.map(function(a) {
    var sk = (a.status || 'new').toLowerCase().replace(/ /g, '-');
    return '<tr>' +
      '<td>' + esc((a.first_name||'') + ' ' + (a.last_name||'')) + '</td>' +
      '<td>' + esc(a.email||'') + '</td>' +
      '<td>' + esc(a.position||'') + '</td>' +
      '<td>' + esc(a.department||'') + '</td>' +
      '<td>' + esc((a.application_date||'').split(' ')[0]) + '</td>' +
      '<td><span class="badge bd-' + sk + '">' + esc(a.status||'New') + '</span></td>' +
      '<td>' +
        '<button class="btn-sm bsm-blue" data-id="' + a.id + '" onclick="am_openAssess(this.dataset.id)">Assess</button> ' +
        '<button class="btn-sm bsm-green" data-id="' + a.id + '" onclick="am_viewApplicant(this.dataset.id)">View</button>' +
      '</td></tr>';
  }).join('');
}
/* ── Assessment ── */
function am_openAssess(id) {
  var a = AM.find(function(x) { return String(x.id) === String(id); });
  if (!a) return;
  document.getElementById('am_assess_name').value = (a.first_name||'') + ' ' + (a.last_name||'');
  document.getElementById('am_assess_name').dataset.applicantId = id;
  
  // Find existing assessment and populate form
  var existingAssessment = ASSESS.find(function(ass) { return String(ass.applicant_id) === String(id); });
  if (existingAssessment) {
    document.getElementById('am_assess_tech').value = existingAssessment.tech || 5;
    document.getElementById('am_assess_comm').value = existingAssessment.comm || 5;
    document.getElementById('am_assess_prob').value = existingAssessment.prob || 5;
    document.getElementById('am_assess_fit').value = existingAssessment.fit || 5;
    document.getElementById('am_assess_notes').value = existingAssessment.notes || '';
  } else {
    // Reset form to default values
    document.getElementById('am_assess_tech').value = 5;
    document.getElementById('am_assess_comm').value = 5;
    document.getElementById('am_assess_prob').value = 5;
    document.getElementById('am_assess_fit').value = 5;
    document.getElementById('am_assess_notes').value = '';
  }
  
  // Apply appropriate scrollbar styling based on current mode
  var notesTextarea = document.getElementById('am_assess_notes');
  if (notesTextarea) {
    if (document.body.classList.contains('dark-mode')) {
      // Dark mode scrollbar colors
      notesTextarea.style.scrollbarWidth = 'thin';
      notesTextarea.style.scrollbarColor = '#404040 #0a0a0a';
    } else {
      // Light mode scrollbar colors
      notesTextarea.style.scrollbarWidth = 'thin';
      notesTextarea.style.scrollbarColor = '#6b7280 #f8f9fa';
    }
  }
  am_open('am_modal_assess');
}
function am_saveAssess() {
  var id   = document.getElementById('am_assess_name').dataset.applicantId;
  var name = g('am_assess_name');
  var tech = parseInt(g('am_assess_tech')||5);
  var comm = parseInt(g('am_assess_comm')||5);
  var prob = parseInt(g('am_assess_prob')||5);
  var fit  = parseInt(g('am_assess_fit')||5);
  var notes = g('am_assess_notes');
  
  // Save assessment via API
  fetch('../api/simple-api-new.php?action=save_assessment', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Accept': 'application/json'
    },
    body: JSON.stringify({
      applicant_id: id,
      tech: tech,
      comm: comm,
      prob: prob,
      fit: fit,
      notes: notes
    })
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      am_close('am_modal_assess');
      am_toast('Assessment saved for ' + name);
      
      // Reload assessments data
      setTimeout(async function() {
        try {
          const response = await fetch('../api/simple-api-new.php?action=get_assessments');
          const assessmentData = await response.json();
          ASSESS = assessmentData.error ? [] : assessmentData;
          console.log('ASSESS reloaded:', ASSESS);
          
          // Refresh assessment tools view
          am_renderAssess();
          
          // Refresh applicant details view if it's open
          var viewModal = document.getElementById('am_modal_view');
          if (viewModal && viewModal.classList.contains('active')) {
            var currentApplicantId = document.getElementById('am_assess_name').dataset.applicantId;
            if (currentApplicantId === id) {
              am_viewApplicant(id);
            }
          }
        } catch(e) {
          console.error('Failed to reload assessments:', e);
        }
      }, 500);
    } else {
      console.error('Failed to save assessment:', data.error);
    }
  })
  .catch(error => {
    console.error('Error saving assessment:', error);
  });
}
/* ── View Applicant Details ── */
function am_viewApplicant(id) {

  var content = document.getElementById('am_view_content');
  if (!content) return;
  
  // Get applicant files

  console.log('FILES keys:', Object.keys(FILES));
  console.log('FILES for applicant:', FILES[id]);

  var numericId = parseInt(id);

    FILE_CATS.forEach(function(cat) {

        '<div><strong style="color:var(--text-secondary);">Applied:</strong> <span style="color:var(--text-primary);">' + esc((a.application_date||'').split(' ')[0]) + '</span></div>' +
      '</div>' +
    '</div>' +
    '<div>' +
      '<h3 style="margin:0 0 16px 0;color:var(--text-primary);">Application Details</h3>' +
      '<div style="background:var(--background);border:1px solid var(--border-color);border-radius:10px;padding:16px;">' +
        '<div style="margin-bottom:12px;"><strong style="color:var(--text-secondary);">Position:</strong> <span style="color:var(--text-primary);">' + esc(a.position||'') + '</span></div>' +
        '<div style="margin-bottom:12px;"><strong style="color:var(--text-secondary);">Department:</strong> <span style="color:var(--text-primary);">' + esc(a.dept||'') + '</span></div>' +
        '<div><strong style="color:var(--text-secondary);">Status:</strong> <select id="applicant_status_' + a.id + '" class="status-dropdown" style="margin-left:8px;padding:4px 8px;border:1px solid var(--border-color);border-radius:6px;background:var(--background);color:var(--text-primary);"><option value="new" ' + ((a.status||'new').toLowerCase().replace(/ /g, '-') === 'new' ? 'selected' : '') + '>New</option><option value="under-review" ' + ((a.status||'new').toLowerCase().replace(/ /g, '-') === 'under-review' ? 'selected' : '') + '>Under Review</option><option value="shortlisted" ' + ((a.status||'new').toLowerCase().replace(/ /g, '-') === 'shortlisted' ? 'selected' : '') + '>Shortlisted</option><option value="hired" ' + ((a.status||'new').toLowerCase().replace(/ /g, '-') === 'hired' ? 'selected' : '') + '>Hired</option><option value="rejected" ' + ((a.status||'new').toLowerCase().replace(/ /g, '-') === 'rejected' ? 'selected' : '') + '>Rejected</option></select> <input type="button" value="Update Status" onclick="console.log(\'Direct click!\'); var status=document.getElementById(\'applicant_status_' + a.id + '\').value; console.log(\'Status:\', status); fetch(\'../api/simple-api-new.php?action=update_status\', {method:\'POST\', headers:{\'Content-Type\':\'application/x-www-form-urlencoded\'}, body:\'id=' + a.id + '&status=\'+status}).then(r=>r.json()).then(d=>{console.log(\'Response:\', d); if(d.success){console.log(\'SUCCESS! Status updated!\'); location.reload();}else{console.error(\'Failed:\', d.error); alert(\'Failed to update status: \' + d.error);}}).catch(e=>console.error(\'Error:\', e))" style="margin-left:64px;margin-top:8px;cursor:pointer;padding:5px 12px;border:none;border-radius:7px;font-size:12px;font-weight:600;background:rgba(44,160,120,.12);color:var(--brand-green);transition:all .2s;" onmouseover="this.style.background=\'var(--brand-green)\';this.style.color=\'#fff\';" onmouseout="this.style.background=\'rgba(44,160,120,.12)\';this.style.color=\'var(--brand-green)\';"></div>' +

console.log('Applicant ID:', a.id);

          '</div>' +
          '<div style="display:flex;gap:6px;">' +
            '<button class="btn-primary" style="padding:6px 12px;font-size:11px;" onclick="window.am_viewFile(\'' + esc(id) + '\',\'' + esc(fileInfo.key) + '\')">View</button>' +

      });

    });
  } else {
    html += '<p style="color:var(--text-secondary);font-style:italic;">No documents submitted yet.</p>';
  }
  
  html += '</div>';
  
  // Assessment section
  html += '<div style="margin-bottom:24px;">' +
    '<h3 style="margin:0 0 16px 0;color:var(--text-primary);">Qualification Assessment</h3>';
  
  if (existingAssessment) {
    var avg = Math.round((parseInt(existingAssessment.tech || 0) + parseInt(existingAssessment.comm || 0) + parseInt(existingAssessment.prob || 0) + parseInt(existingAssessment.fit || 0)) / 4 * 10) / 10;
    html += '<div class="assessment-card">' +
      '<div style="margin-bottom:12px;">' +
        '<div style="font-weight:700;font-size:16px;color:var(--text-primary);">Assessment Results</div>' +
        '<div style="font-size:12px;color:var(--text-secondary);">Assessed on ' + existingAssessment.assessedAt + '</div>' +
      '</div>' +
      '<div class="assess-score">' +
        '<div class="score-item"><div class="score-lbl">Technical</div><div class="score-val">' + existingAssessment.tech + '</div></div>' +
        '<div class="score-item"><div class="score-lbl">Communication</div><div class="score-val">' + existingAssessment.comm + '</div></div>' +
        '<div class="score-item"><div class="score-lbl">Problem Solving</div><div class="score-val">' + existingAssessment.prob + '</div></div>' +
        '<div class="score-item"><div class="score-lbl">Cultural Fit</div><div class="score-val">' + existingAssessment.fit + '</div></div>' +
        '<div class="score-item"><div class="score-lbl">Average</div><div class="score-val">' + avg + '</div></div>' +
      '</div>' +
      (existingAssessment.notes ? '<div style="margin-top:16px;padding:16px;background:var(--surface);border:2px solid var(--border-color);border-radius:10px;font-size:13px;word-wrap:break-word;overflow-wrap:break-word;white-space:normal;max-width:100%;"><strong style="color:var(--text-primary);display:block;margin-bottom:8px;">Notes:</strong> ' + esc(existingAssessment.notes) + '</div>' : '') +
    '</div>';
  } else {
    html += '<div style="background:var(--background);border:1px solid var(--border-color);border-radius:10px;padding:16px;text-align:center;">' +
      '<p style="color:var(--text-secondary);margin:0 0 12px 0;">No assessment completed yet.</p>' +

  setTimeout(function() {
    var updateBtn = document.getElementById('update_status_btn_' + a.id);

  am_open('am_modal_view');

/* ── Resume / File Management ── */
function am_renderResumes() {
  console.log('am_renderResumes called');
  console.log('FILES object:', FILES);
  console.log('FILES keys:', Object.keys(FILES));
  
  // Debug: Check what's actually in FILES[23]
  Object.keys(FILES).forEach(function(appId) {
    console.log('FILES[' + appId + ']:', FILES[appId]);
    console.log('FILES[' + appId + '] keys:', Object.keys(FILES[appId] || {}));
  });
  
  var el = document.getElementById('am_resumes');
  if (!el) return;
  var html = '';
  FILE_CATS.forEach(function(cat) {
    var rows = '';
    Object.keys(FILES).forEach(function(appId) {
      var bucket = FILES[appId];
      console.log('Checking appId:', appId, 'bucket:', bucket, 'cat.key:', cat.key, 'bucket[cat.key]:', bucket ? bucket[cat.key] : 'bucket is null');
      if (!bucket || !bucket[cat.key]) return;
      var f = bucket[cat.key];
      /* Use data-* so onclick handlers NEVER contain nested quotes */
      rows += '<div class="file-item">' +
        '<div>' +
          '<div class="file-name-wrap">' + SVG.file + esc(f.fileName||'') + '</div>' +
          '<div class="file-meta">' + esc(f.applicantName||'') + ' &bull; ' + esc(f.fileSize||'') + ' &bull; ' + esc(f.uploadedAt||'') + '</div>' +
        '</div>' +
        '<div style="display:flex;gap:8px;">' +
          '<button class="btn-sm bsm-blue"  data-aid="' + esc(appId) + '" data-key="' + esc(cat.key) + '" onclick="am_viewFile(this.dataset.aid,this.dataset.key)">View</button>' +
          '<button class="btn-sm bsm-green" data-aid="' + esc(appId) + '" data-key="' + esc(cat.key) + '" onclick="am_downloadFile(this.dataset.aid,this.dataset.key)">Download</button>' +
        '</div>' +
      '</div>';
    });
    html += '<div class="cat-section">' +
      '<div class="cat-heading">' + SVG[cat.icon] + cat.label + '</div>' +
      (rows ? '<div class="file-list">' + rows + '</div>' : '<p class="empty-msg">No files in this category yet.</p>') +
    '</div>';
  });
  el.innerHTML = html || '<p class="empty-msg">No files uploaded yet.</p>';
}
/* ── Assessment Tools ── */
function am_renderAssess() {
  var el = document.getElementById('am_assessments');
  if (!el) return;
  var assessments = ASSESS || [];
  if (!assessments.length) {
    el.innerHTML = '<h3 style="margin-bottom:16px;">Assessment Results</h3><p class="empty-full">No assessments completed yet.</p>';
    return;
  }
  el.innerHTML = '<h3 style="margin-bottom:16px;">Assessment Results</h3>' +
    assessments.map(function(a) {
      var avg = Math.round((parseInt(a.tech || 0) + parseInt(a.comm || 0) + parseInt(a.prob || 0) + parseInt(a.fit || 0)) / 4 * 10) / 10;
      return '<div class="assessment-card">' +
        '<div style="margin-bottom:12px;">' +
          '<div style="font-weight:700;font-size:16px;">' + esc(a.applicantName) + '</div>' +
          '<div style="font-size:12px;color:var(--text-secondary);">Assessed on ' + (a.assessedAt || 'N/A') + '</div>' +
        '</div>' +
        '<div class="assess-score">' +
          '<div class="score-item"><div class="score-lbl">Technical</div><div class="score-val">' + (a.tech || 0) + '</div></div>' +
          '<div class="score-item"><div class="score-lbl">Communication</div><div class="score-val">' + (a.comm || 0) + '</div></div>' +
          '<div class="score-item"><div class="score-lbl">Problem Solving</div><div class="score-val">' + (a.prob || 0) + '</div></div>' +
          '<div class="score-item"><div class="score-lbl">Cultural Fit</div><div class="score-val">' + (a.fit || 0) + '</div></div>' +
          '<div class="score-item"><div class="score-lbl">Average</div><div class="score-val">' + avg + '</div></div>' +
        '</div>' +
        (a.notes ? '<div style="margin-top:16px;padding:16px;background:var(--surface);border:2px solid var(--border-color);border-radius:10px;font-size:13px;word-wrap:break-word;overflow-wrap:break-word;white-space:normal;max-width:100%;"><strong style="color:var(--text-primary);display:block;margin-bottom:8px;">Notes:</strong> ' + esc(a.notes) + '</div>' : '') +

/* ── Stats ── */
function am_updateStats() {
  try {
    console.log('Updating application stats with AM array:', AM);
    console.log('AM length:', AM.length);
    
    // Debug: Log all application statuses
    AM.forEach(function(a) {
      console.log('Application ID:', a.id, 'Status:', a.status, 'Status (lowercase):', (a.status||'new').toLowerCase());
    });
    
    document.getElementById('am_s_total').textContent = AM.length;
    document.getElementById('am_s_new').textContent = AM.filter(function(a) { return (a.status||'new').toLowerCase() === 'new'; }).length;
    document.getElementById('am_s_review').textContent = AM.filter(function(a) { 
      var status = (a.status||'new').toLowerCase();
      return status === 'under review' || status === 'under-review'; 
    }).length;
    document.getElementById('am_s_short').textContent = AM.filter(function(a) { return (a.status||'new').toLowerCase() === 'shortlisted'; }).length;
    document.getElementById('am_s_hired').textContent = AM.filter(function(a) { return (a.status||'new').toLowerCase() === 'hired'; }).length;
    
    console.log('Stats updated - Total:', AM.length, 'New:', AM.filter(function(a) { return (a.status||'new').toLowerCase() === 'new'; }).length, 'Under Review:', AM.filter(function(a) { 
      var status = (a.status||'new').toLowerCase();
      return status === 'under review' || status === 'under-review'; 
    }).length);
  } catch(e) {
    console.error('Error updating application stats:', e);
  }
}
/* ── Data Reset ── */
function am_confirmReset() {
  var confirmed = window.confirm(
    'Are you sure you want to clear ALL data?\n\n' +
    'This will delete:\n' +
    '  • All applications\n' +
    '  • All uploaded files\n' +
    '  • All job postings\n\n' +
    'This cannot be undone.'
  );
  if (!confirmed) return;
  // Clear data via API
  fetch('../api/simple-api-new.php?action=clear_data', {
    method: 'DELETE'
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      // Clear local data
      AM = []; FILES = {}; ASSESS = []; COMM = [];
      
      // Refresh displays
      am_render();
      am_updateStats();
      am_toast('All data cleared. You can now start fresh.');
    } else {
      console.error('Failed to clear data:', data.error);
      am_toast('Failed to clear data');
    }
  })
  .catch(error => {
    console.error('Error clearing data:', error);
    am_toast('Error clearing data');
  });
}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Integration Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .test-btn { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .result { margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 4px; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <h1>Database Integration Test</h1>
    
    <div class="test-section">
        <h3>Test 1: Update Applicant Status</h3>
        <button class="test-btn" onclick="testUpdateStatus()">Test Status Update</button>
        <div id="status-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>Test 2: Save Assessment</h3>
        <button class="test-btn" onclick="testSaveAssessment()">Test Save Assessment</button>
        <div id="assessment-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>Test 3: Clear Data</h3>
        <button class="test-btn" onclick="testClearData()">Test Clear Data</button>
        <div id="clear-result" class="result"></div>
    </div>

    <script>
        // Test functions
        async function testUpdateStatus() {
            try {
                const response = await fetch('../api/simple-api-new.php?action=update_status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'id=1&status=under-review'
                });
                const data = await response.json();
                document.getElementById('status-result').innerHTML = 
                    '<span class="' + (data.success ? 'success' : 'error') + '">' + 
                    (data.success ? 'Status updated successfully' : 'Failed: ' + (data.error || 'Unknown error')) + '</span>';
            } catch (error) {
                document.getElementById('status-result').innerHTML = '<span class="error">Error: ' + error.message + '</span>';
            }
        }
        
        async function testSaveAssessment() {
            try {
                const response = await fetch('../api/simple-api-new.php?action=save_assessment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        applicant_id: 1,
                        tech: 8,
                        comm: 7,
                        prob: 6,
                        fit: 9,
                        notes: 'Test assessment from integration test'
                    })
                });
                const data = await response.json();
                document.getElementById('assessment-result').innerHTML = 
                    '<span class="' + (data.success ? 'success' : 'error') + '">' + 
                    (data.success ? 'Assessment saved successfully' : 'Failed: ' + (data.error || 'Unknown error')) + '</span>';
            } catch (error) {
                document.getElementById('assessment-result').innerHTML = '<span class="error">Error: ' + error.message + '</span>';
            }
        }
        
        async function testClearData() {
            try {
                const response = await fetch('../api/simple-api-new.php?action=clear_data', {
                    method: 'DELETE'
                });
                const data = await response.json();
                document.getElementById('clear-result').innerHTML = 
                    '<span class="' + (data.success ? 'success' : 'error') + '">' + 
                    (data.success ? 'Data cleared successfully' : 'Failed: ' + (data.error || 'Unknown error')) + '</span>';
            } catch (error) {
                document.getElementById('clear-result').innerHTML = '<span class="error">Error: ' + error.message + '</span>';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Test Job Posting</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #2ca078; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #239068; }
        .result { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h2>Test Job Posting</h2>
    <form id="jobForm">
        <div class="form-group">
            <label>Job Title *</label>
            <input type="text" id="title" required>
        </div>
        <div class="form-group">
            <label>Department</label>
            <input type="text" id="department">
        </div>
        <div class="form-group">
            <label>Location</label>
            <input type="text" id="location">
        </div>
        <div class="form-group">
            <label>Employment Type</label>
            <select id="employment_type">
                <option>Full-time</option>
                <option>Part-time</option>
                <option>Contract</option>
            </select>
        </div>
        <div class="form-group">
            <label>Description *</label>
            <textarea id="description" rows="4" required></textarea>
        </div>
        <div class="form-group">
            <label>Salary Range</label>
            <input type="text" id="salary_range">
        </div>
        <button type="submit">Post Job</button>
    </form>
    <div id="result"></div>

    <h3>Current Jobs:</h3>
    <div id="jobsList"></div>

    <script>
        async function postJob() {
            const data = {
                title: document.getElementById('title').value,
                department: document.getElementById('department').value,
                location: document.getElementById('location').value,
                employment_type: document.getElementById('employment_type').value,
                description: document.getElementById('description').value,
                salary_range: document.getElementById('salary_range').value,
                status: 'Active'
            };

            try {
                const response = await fetch('./api/simple-api-new.php?action=save_job_posting', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('result').innerHTML = '<div class="result success">Job posted successfully! ID: ' + result.job_id + '</div>';
                    document.getElementById('jobForm').reset();
                    loadJobs();
                } else {
                    document.getElementById('result').innerHTML = '<div class="result error">Error: ' + result.error + '</div>';
                }
            } catch (error) {
                document.getElementById('result').innerHTML = '<div class="result error">Network error: ' + error.message + '</div>';
            }
        }

        async function loadJobs() {
            try {
                const response = await fetch('./api/simple-api-new.php?action=get_job_postings');
                const jobs = await response.json();
                
                let html = '';
                if (jobs.length === 0) {
                    html = '<p>No jobs found.</p>';
                } else {
                    html = '<ul>';
                    jobs.forEach(job => {
                        html += '<li><strong>' + job.title + '</strong> - ' + job.department + ' (' + job.status + ')</li>';
                    });
                    html += '</ul>';
                }
                
                document.getElementById('jobsList').innerHTML = html;
            } catch (error) {
                document.getElementById('jobsList').innerHTML = '<p>Error loading jobs: ' + error.message + '</p>';
            }
        }

        document.getElementById('jobForm').addEventListener('submit', function(e) {
            e.preventDefault();
            postJob();
        });

        // Load jobs on page load
        loadJobs();
    </script>
</body>
</html>

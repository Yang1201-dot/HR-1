<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HR Staff Login - Microfinance System</title>
<style>
:root{
  --brand-green:#2ca078;
  --button-hover:#4fb97a;
  --background:#0a0a0a;
  --surface:#1a1a1a;
  --text-primary:#f9fafb;
  --text-secondary:#d1d5db;
  --border-color:#2d2d2d;
  --shadow:0 10px 30px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(135deg,#1a1a1a 0%,#0a0a0a 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.login-container{
  background:var(--surface);
  border:1px solid var(--border-color);
  border-radius:20px;
  padding:48px;
  width:100%;
  max-width:440px;
  box-shadow:var(--shadow);
}
.logo-section{
  text-align:center;
  margin-bottom:32px;
}
.logo{
  width:120px;
  height:120px;
  margin:0 auto 16px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.logo img{
  width:100%;
  height:100%;
  object-fit:contain;
}
.company-name{
  font-size:24px;
  font-weight:700;
  color:var(--text-primary);
  margin-bottom:4px;
}
.portal-subtitle{
  font-size:14px;
  color:var(--text-secondary);
}
.badge{
  display:inline-block;
  padding:4px 12px;
  background:rgba(44,160,120,.15);
  color:var(--brand-green);
  border-radius:20px;
  font-size:12px;
  font-weight:700;
  margin-top:8px;
}
.form-group{
  margin-bottom:20px;
}
.form-group label{
  display:block;
  margin-bottom:8px;
  font-size:14px;
  font-weight:600;
  color:var(--text-primary);
}
.form-group input{
  width:100%;
  padding:14px 16px;
  border:1px solid var(--border-color);
  border-radius:12px;
  background:var(--background);
  color:var(--text-primary);
  font-size:15px;
  transition:border .2s;
}
.form-group input:focus{
  outline:none;
  border-color:var(--brand-green);
}
.form-group input::placeholder{
  color:#6b7280;
}
.btn-login{
  width:100%;
  padding:14px;
  background:var(--brand-green);
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:all .2s;
  margin-top:8px;
}
.btn-login:hover{
  background:var(--button-hover);
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(44,160,120,.3);
}
.back-link{
  text-align:center;
  margin-top:20px;
}
.back-link a{
  color:var(--text-secondary);
  text-decoration:none;
  font-size:14px;
  transition:color .2s;
}
.back-link a:hover{
  color:var(--brand-green);
}
.error-msg{
  background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.3);
  color:#ef4444;
  padding:12px;
  border-radius:8px;
  margin-bottom:20px;
  font-size:14px;
  display:none;
}
.error-msg.show{
  display:block;
}
</style>
</head>
<body>
<div class="login-container">
  <div class="logo-section">
    <div class="logo">
      <img src="img/logo.png" alt="Company Logo">
    </div>
    <h1 class="company-name">Microfinance</h1>
    <p class="portal-subtitle">HR Workforce System</p>
    <span class="badge">Staff Access</span>
  </div>
  
  <div class="error-msg" id="errorMsg"></div>
  
  <form id="loginForm" onsubmit="return handleLogin(event)">
    <div class="form-group">
      <label for="username">Username or Email</label>
      <input type="text" id="username" placeholder="Enter your username" required>
    </div>
    
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
    </div>
    
    <button type="submit" class="btn-login">Access HR System</button>
  </form>
  
  <div class="back-link">
    <a href="employee-portal-login.html">← Back to Employee Portal</a>
  </div>
</div>

<script>
function handleLogin(event) {
  event.preventDefault();
  
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  
  // Send login request to PHP backend
  fetch('api/hr-staff-login.php', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, password})
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      // Store session data
      localStorage.setItem('hr_staff_token', data.token);
      localStorage.setItem('hr_staff_name', data.name);
      localStorage.setItem('hr_staff_id', data.staff_id);
      localStorage.setItem('hr_staff_role', data.role);
      
      // Redirect based on role
      if (data.role === 'HR_Manager') {
        window.location.href = 'hr-manager-dashboard.html';
      } else {
        window.location.href = 'modules/dashboard.html';
      }
    } else {
      showError(data.message || 'Invalid credentials');
    }
  })
  .catch(err => {
    showError('Connection error. Please try again.');
  });
  
  return false;
}

function showError(message) {
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.textContent = message;
  errorMsg.classList.add('show');
  
  setTimeout(() => {
    errorMsg.classList.remove('show');
  }, 5000);
}
</script>
</body>
</html>
